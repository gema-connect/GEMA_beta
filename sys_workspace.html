<!doctype html>
<html lang="de">
<head>
<script src="gema_auth.js"></script>
<script src="gema_recent.js"></script>
<meta charset="utf-8"/>
<meta name="theme-color" content="#0f172a"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<title>GEMA – Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#FAFAFA;--card:#fff;--ink:#0f172a;--ink-2:#475569;--ink-3:#94a3b8;
  --line:#E5E7EB;--line-2:#EEF1F4;--accent-notes:#F59E0B;
  --green:#10B981;--green-deep:#0c4a2e;--navy:#1e3a5f;--blue:#3B82F6;
  --gradient:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0c4a2e 100%);
  --r-card:20px;--r-sm:12px;
  --shadow-1:0 1px 2px rgba(15,23,42,.04),0 2px 4px rgba(15,23,42,.03);
  --shadow-2:0 4px 16px rgba(15,23,42,.06),0 1px 4px rgba(15,23,42,.04);
  --shadow-3:0 12px 40px rgba(15,23,42,.12),0 4px 12px rgba(15,23,42,.06);
  --t:220ms cubic-bezier(.2,.7,.2,1);
  --sans:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;font-feature-settings:'ss01' on,'cv11' on}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit}
input::placeholder{color:#cbd5e1}

/* ── Nav ── */
.g-nav{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);box-shadow:var(--shadow-1)}
.nav-in{padding:0 24px;height:52px;display:flex;align-items:center;gap:12px}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0}
.nav-logo svg{height:28px}
.nav-back{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--ink-2);font-size:12.5px;font-weight:600;text-decoration:none;transition:var(--t)}
.nav-back:hover{background:#F4F5F7}
.g-nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.g-nav-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--ink-2);font-size:12.5px;font-weight:600;cursor:pointer;text-decoration:none;transition:var(--t)}.g-nav-btn:hover{background:#F4F5F7;color:var(--ink)}
.gema-feedback-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:8px;border:none;background:#dc2626;color:#fff;font-size:12.5px;font-weight:700;cursor:pointer}.gema-feedback-btn:hover{background:#b91c1c}

/* ── Search ── */
.ws-search{display:flex;align-items:center;gap:8px;background:#F4F5F7;border:1px solid transparent;border-radius:var(--r-sm);padding:7px 12px;color:var(--ink-2);transition:var(--t);flex:1;max-width:400px}
.ws-search:focus-within{background:var(--card);border-color:var(--line);box-shadow:var(--shadow-1)}
.ws-search input{flex:1;border:0;background:transparent;outline:none;font-size:13px;color:var(--ink)}
.ws-search-hint{font-size:11px;color:var(--ink-3);border:1px solid var(--line);padding:1px 5px;border-radius:5px;background:var(--card)}
.ws-search-results{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:var(--shadow-2);max-height:320px;overflow-y:auto;z-index:100;margin-top:4px}
.ws-search-item{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:13px;cursor:pointer;transition:var(--t);text-decoration:none;color:inherit}
.ws-search-item:hover{background:#F4F5F7}
.ws-search-item-sub{font-size:11px;color:var(--ink-3)}
.ws-search-wrap{position:relative;flex:1;max-width:400px}
@media(max-width:720px){.ws-search-wrap{display:none}}

/* ── App Shell ── */
.ws-shell{display:flex;min-height:calc(100vh - 53px)}

/* ── Sidebar ── */
.ws-sidebar{width:280px;flex-shrink:0;background:var(--card);border-right:1px solid var(--line);padding:20px 14px 16px;display:flex;flex-direction:column;gap:18px;overflow-y:auto;height:calc(100vh - 53px);position:sticky;top:53px}
.ws-sidebar::-webkit-scrollbar{width:6px}
.ws-sidebar::-webkit-scrollbar-thumb{background:#d6dade;border-radius:6px}
.ws-user{display:flex;align-items:center;gap:10px;padding:4px 6px 12px;border-bottom:1px solid var(--line-2)}
.ws-user-meta{line-height:1.25;min-width:0;flex:1}
.ws-user-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ws-user-role{font-size:12px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ws-label{font-size:10.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-3)}
.ws-org-section{display:flex;flex-direction:column;gap:8px}
.ws-org-pills{display:flex;flex-wrap:wrap;gap:6px}
.ws-org-pill{font-size:12px;font-weight:500;padding:5px 10px;border-radius:999px;background:#F4F5F7;color:var(--ink-2);transition:var(--t);border:1px solid transparent}
.ws-org-pill:hover{background:#ECEEF1}
.ws-org-pill.active{background:var(--ink);color:#fff}
.ws-org-pill--all.active{background:var(--gradient);color:#fff}
.ws-section{display:flex;flex-direction:column;gap:8px}
.ws-section-head{display:flex;align-items:center;justify-content:space-between;padding:0 4px}
.ws-bucket-list{display:flex;flex-direction:column;gap:2px}
.ws-empty-hint{padding:8px 10px;font-size:12px;color:var(--ink-3);font-style:italic}
.ws-bucket-row{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border-radius:var(--r-sm);text-align:left;font-size:13px;color:var(--ink);transition:background var(--t);position:relative}
.ws-bucket-row:hover{background:#F4F5F7}
.ws-bucket-row.active{background:#EDF1F7;color:var(--navy);font-weight:500}
.ws-bucket-row__icon{display:inline-flex;flex-shrink:0}
.ws-bucket-row__name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ws-sidebar-new{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;padding:7px 10px;margin-top:4px;border-radius:var(--r-sm);color:var(--ink-2);border:1px dashed var(--line);align-self:flex-start}
.ws-sidebar-new:hover{color:var(--navy);border-color:var(--navy);background:#F8FAFC}
.ws-icon-btn{display:inline-grid;place-items:center;width:26px;height:26px;border-radius:8px;color:var(--ink-2);transition:var(--t)}
.ws-icon-btn:hover{background:#F4F5F7;color:var(--ink)}
.ws-sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid var(--line-2);display:flex;flex-direction:column;gap:8px}
.ws-tag-row{display:flex;flex-wrap:wrap;gap:6px}
.ws-org-tag{font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;background:#EFF4FB;color:var(--blue);letter-spacing:.02em}

/* ── Main Area ── */
.ws-main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;background:var(--bg)}

/* ── Notes Panel (Shell-level, right column) ── */
.ws-notes-col{width:360px;flex-shrink:0;height:calc(100vh - 53px);position:sticky;top:53px;display:flex;flex-direction:column;overflow:hidden;border-left:1px solid var(--line)}

/* ── Content Header ── */
.ws-bucket-header{padding:22px 28px 18px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;background:var(--card);border-bottom:1px solid var(--line)}
.ws-bucket-header-left{display:flex;gap:14px;align-items:flex-start;min-width:0}
.ws-bucket-type-icon{margin-top:4px;width:36px;height:36px;border-radius:var(--r-sm);background:linear-gradient(135deg,#F0F4FA 0%,#E8F0EA 100%);display:grid;place-items:center;flex-shrink:0;color:var(--navy)}
.ws-bucket-title{font-size:24px;font-weight:600;letter-spacing:-.015em;margin:0 0 6px;padding:2px 6px;border-radius:6px;cursor:text;outline:none;transition:background var(--t);display:inline-block;max-width:100%}
.ws-bucket-title:hover{background:#F4F5F7}
.ws-bucket-title.editing{background:var(--card);box-shadow:0 0 0 2px var(--navy)}
.ws-bucket-meta{font-size:12.5px;color:var(--ink-2);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.ws-meta-sep{color:var(--ink-3)}
.ws-meta-chip{display:inline-flex;align-items:center;gap:4px}
.ws-bucket-actions{display:flex;gap:8px;flex-shrink:0}

/* ── Buttons ── */
.ws-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:8px 14px;border-radius:var(--r-sm);transition:var(--t);white-space:nowrap}
.ws-btn-ghost{background:#F4F5F7;color:var(--ink-2)}
.ws-btn-ghost:hover{background:#ECEEF1;color:var(--ink)}
.ws-btn-primary{background:var(--gradient);color:#fff;box-shadow:var(--shadow-2)}
.ws-btn-primary:hover{transform:translateY(-1px);box-shadow:var(--shadow-3)}
.ws-btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── Content Scroll ── */
.ws-content-scroll{flex:1;overflow-y:auto;padding:0 28px 32px;display:flex;flex-direction:column;gap:24px}
.ws-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-3)}
.ws-section-head-content{display:flex;align-items:center;gap:10px;margin:8px 0 -8px;padding:10px 4px 0}
.ws-section-count{font-size:11px;color:var(--ink-3);background:var(--line-2);padding:1px 7px;border-radius:999px}

/* ── Module Grid ── */
.ws-mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.ws-mod-tile{display:flex;align-items:center;gap:14px;padding:16px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);text-align:left;transition:var(--t);box-shadow:var(--shadow-1);cursor:pointer;text-decoration:none;color:inherit}
.ws-mod-tile:hover{transform:translateY(-2px);box-shadow:var(--shadow-2);border-color:#d4dae2}
.ws-mod-tile-icon{width:44px;height:44px;border-radius:var(--r-sm);background:linear-gradient(135deg,#F0F4FA 0%,#E8F0EA 100%);color:var(--navy);display:grid;place-items:center;flex-shrink:0;transition:var(--t)}
.ws-mod-tile:hover .ws-mod-tile-icon{background:var(--gradient);color:#fff}
.ws-mod-tile-name{font-weight:600;font-size:14px;margin-bottom:2px}
.ws-mod-kpi{font-size:11.5px;color:var(--navy);font-weight:600;margin-bottom:3px;line-height:1.3;letter-spacing:-.01em}
.ws-mod-ts{font-size:10px;color:var(--ink-3);white-space:nowrap}
.ws-mod-tile-status{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-3)}
.ws-mod-dot{width:7px;height:7px;border-radius:50%;background:var(--ink-3)}
.ws-mod-tile-status.done{color:var(--green)}
.ws-mod-tile-status.done .ws-mod-dot{background:var(--green);box-shadow:0 0 0 3px rgba(16,185,129,.16)}
.ws-mod-tile-status.wip{color:var(--blue)}
.ws-mod-tile-status.wip .ws-mod-dot{background:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.16)}
.ws-mod-tile-status.anlage{color:var(--navy)}
.ws-mod-tile-status.anlage .ws-mod-dot{background:var(--navy);box-shadow:0 0 0 3px rgba(30,58,95,.16)}
.ws-mod-tile-status.offerte{color:#d97706}
.ws-mod-tile-status.offerte .ws-mod-dot{background:#d97706;box-shadow:0 0 0 3px rgba(217,119,6,.16)}
.ws-mod-tile--add{background:transparent;border:1.5px dashed var(--line);box-shadow:none;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:22px 16px;color:var(--ink-3);min-height:76px}
.ws-mod-tile--add:hover{border-color:var(--navy);color:var(--navy);background:#F8FAFC;transform:none}
.ws-mod-plus{width:36px;height:36px;border-radius:10px;background:var(--card);display:grid;place-items:center;margin-bottom:6px;border:1px solid var(--line)}
.ws-mod-add-label{font-size:13px;font-weight:500}
.ws-mod-hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:40px 24px;background:var(--card);border:1.5px dashed var(--line);border-radius:var(--r-card);color:var(--ink-2);transition:var(--t);cursor:pointer}
.ws-mod-hero:hover{border-color:var(--navy);background:#F8FAFC;transform:translateY(-1px)}
.ws-mod-hero-plus{width:56px;height:56px;border-radius:16px;background:var(--gradient);color:#fff;display:grid;place-items:center;margin-bottom:14px;box-shadow:var(--shadow-2)}
.ws-mod-hero-title{font-size:17px;font-weight:600;color:var(--ink);margin-bottom:6px;letter-spacing:-.01em}
.ws-mod-hero-sub{font-size:13px;color:var(--ink-3);max-width:360px}

/* ── Activity ── */
.ws-activity{background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);padding:16px 18px}
.ws-activity-list{list-style:none;display:flex;flex-direction:column;gap:10px}
.ws-activity-item{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--ink)}
.ws-activity-body{line-height:1.45;padding-top:4px}
.ws-activity-who{font-weight:600}
.ws-activity-time{color:var(--ink-3)}

/* ── Beteiligte ── */
.ws-collapse{background:var(--card);border:1px solid var(--line);border-radius:var(--r-card)}
.ws-collapse-head{display:flex;align-items:center;gap:10px;width:100%;padding:14px 18px;text-align:left;cursor:pointer}
.ws-collapse-count{font-size:11px;color:var(--ink-3);background:var(--line-2);padding:1px 7px;border-radius:999px}
.ws-collapse-chev{margin-left:auto;color:var(--ink-3);transition:transform var(--t);display:inline-flex}
.ws-collapse.open .ws-collapse-chev{transform:rotate(180deg)}
.ws-people{list-style:none;padding:0 18px 16px;display:flex;flex-direction:column;gap:10px}
.ws-people-row{display:flex;align-items:center;gap:12px}
.ws-people-name{font-size:13.5px;font-weight:500}
.ws-people-role{font-weight:400;color:var(--ink-3)}
.ws-people-org{font-size:12px;color:var(--ink-3)}

/* ── Empty State ── */
.ws-empty-state{flex:1;display:grid;place-items:center;padding:40px 24px;background:radial-gradient(ellipse at top,rgba(30,58,95,.04) 0%,transparent 60%),radial-gradient(ellipse at bottom right,rgba(12,74,46,.04) 0%,transparent 60%),var(--bg)}
.ws-empty-inner{max-width:760px;width:100%;text-align:center}
.ws-empty-badge{width:64px;height:64px;margin:0 auto 22px;border-radius:18px;background:var(--gradient);color:#fff;display:grid;place-items:center;box-shadow:var(--shadow-3)}
.ws-empty-hero{font-size:36px;font-weight:600;letter-spacing:-.02em;margin:0 0 12px;background:var(--gradient);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.ws-empty-sub{font-size:15px;color:var(--ink-2);line-height:1.55;max-width:540px;margin:0 auto 36px}
.ws-empty-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;text-align:left}
@media(max-width:720px){.ws-empty-cards{grid-template-columns:1fr}}
.ws-empty-card{padding:22px 20px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);transition:var(--t);box-shadow:var(--shadow-1);cursor:pointer;display:flex;flex-direction:column;gap:8px}
.ws-empty-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-3);border-color:transparent}
.ws-empty-card-icon{width:44px;height:44px;border-radius:var(--r-sm);background:linear-gradient(135deg,#F0F4FA 0%,#E8F0EA 100%);display:grid;place-items:center;margin-bottom:4px}
.ws-empty-card-title{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:-.01em}
.ws-empty-card-desc{font-size:13px;color:var(--ink-2);line-height:1.4;flex:1}
.ws-empty-card-cta{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;font-weight:500;color:var(--navy);margin-top:4px;transition:var(--t)}
.ws-empty-card:hover .ws-empty-card-cta{gap:8px}
.ws-empty-custom{font-size:13.5px;color:var(--ink-2);padding:10px 14px;border-radius:var(--r-sm)}
.ws-empty-custom:hover{color:var(--navy)}

/* ── Modals ── */
.ws-modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.32);backdrop-filter:blur(3px);display:grid;place-items:center;z-index:300;padding:24px;animation:ws-fade-in 180ms ease}
.ws-modal{width:100%;max-width:520px;background:var(--card);border-radius:var(--r-card);box-shadow:var(--shadow-3);overflow:hidden;animation:ws-modal-in 220ms cubic-bezier(.2,.7,.2,1)}
.ws-modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 12px}
.ws-modal-title{font-size:17px;font-weight:600;margin:0;letter-spacing:-.01em}
.ws-modal-body{padding:6px 22px 22px}
@keyframes ws-fade-in{from{opacity:0}to{opacity:1}}
@keyframes ws-modal-in{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.ws-form{display:flex;flex-direction:column;gap:16px}
.ws-form-field{display:flex;flex-direction:column;gap:8px}
.ws-form-field>label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)}
.ws-input{padding:10px 14px;border:1px solid var(--line);border-radius:var(--r-sm);font-size:14px;outline:none;transition:var(--t);width:100%}
.ws-input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(30,58,95,.12)}
.ws-form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
.ws-type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:480px){.ws-type-grid{grid-template-columns:repeat(2,1fr)}}
.ws-type-card{padding:14px 8px;background:#F4F5F7;border-radius:var(--r-sm);display:flex;flex-direction:column;align-items:center;gap:6px;font-size:12px;color:var(--ink-2);border:1.5px solid transparent;transition:var(--t)}
.ws-type-card:hover{background:#ECEEF1;color:var(--ink)}
.ws-type-card.active{background:var(--card);border-color:var(--navy);color:var(--navy);font-weight:500}

/* ── Module Picker Modal ── */
.ws-modpicker{display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto}
.ws-modpicker-item{display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:var(--r-sm);text-align:left;transition:var(--t);border:1px solid transparent;cursor:pointer}
.ws-modpicker-item:hover{background:#F4F5F7;border-color:var(--line)}
.ws-modpicker-item.disabled{opacity:.5;cursor:not-allowed}
.ws-modpicker-item.disabled:hover{background:transparent;border-color:transparent}
.ws-modpicker-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#F0F4FA 0%,#E8F0EA 100%);color:var(--navy);display:grid;place-items:center;flex-shrink:0}
.ws-modpicker-name{font-size:14px;font-weight:600}
.ws-modpicker-desc{font-size:12.5px;color:var(--ink-3)}
.ws-modpicker-tag{font-size:11px;color:var(--ink-3);font-style:italic;margin-left:auto;white-space:nowrap}
.ws-modpicker-cat{font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);padding:12px 14px 4px;display:flex;align-items:center;gap:6px}
.ws-modpicker-cat:first-child{padding-top:0}

/* ── Drag & Drop ── */
.ws-mod-tile[draggable=true]{cursor:default}
.ws-mod-tile[draggable=true]:active{cursor:grabbing}
.ws-mod-tile.drag-over{border-color:var(--navy);box-shadow:0 0 0 2px rgba(30,58,95,.15)}
.ws-mod-tile.dragging{opacity:.4}
.ws-tpl-drag-item{cursor:grab;user-select:none}
.ws-tpl-drag-item:active{cursor:grabbing}
.ws-tpl-drag-item.drag-over{border-bottom:2px solid var(--navy)}
.ws-tpl-drag-item.dragging{opacity:.4}

/* ── Delete Confirm ── */
.ws-confirm-text{font-size:14px;color:var(--ink-2);line-height:1.5;margin-bottom:8px}
.ws-btn-danger{background:#dc2626;color:#fff;box-shadow:var(--shadow-1)}.ws-btn-danger:hover{background:#b91c1c}

/* ── Toast ── */
.ws-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;padding:10px 18px;border-radius:999px;display:inline-flex;align-items:center;gap:8px;box-shadow:var(--shadow-3);z-index:400;animation:ws-toast-in 240ms cubic-bezier(.2,.7,.2,1);pointer-events:none}
@keyframes ws-toast-in{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%)}}

/* ── Avatar ── */
.ws-avatar{border-radius:50%;color:#fff;font-weight:600;display:inline-flex;align-items:center;justify-content:center;letter-spacing:.02em;flex-shrink:0}

/* ── Tab Bar ── */
.ws-tabbar{background:linear-gradient(180deg,#F0F2F5 0%,#E9ECF0 100%);padding:8px 12px 0;border-bottom:1px solid var(--line);flex-shrink:0}
.ws-tabs{display:flex;align-items:flex-end;gap:2px;overflow-x:auto}
.ws-tabs::-webkit-scrollbar{height:0}
.ws-tab{display:inline-flex;align-items:center;gap:8px;padding:8px 10px 8px 12px;background:#DFE3E8;border-radius:10px 10px 0 0;font-size:12.5px;color:var(--ink-2);max-width:220px;position:relative;transition:var(--t);cursor:pointer;flex-shrink:0}
.ws-tab:hover{background:#E8EBEF}
.ws-tab.active{background:#fff;color:var(--ink);font-weight:500;box-shadow:0 -2px 6px rgba(15,23,42,.04)}
.ws-tab.active::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gradient);border-radius:10px 10px 0 0}
.ws-tab-icon{display:inline-flex;flex-shrink:0}
.ws-tab-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.ws-tab-close{display:inline-grid;place-items:center;width:18px;height:18px;border-radius:5px;color:var(--ink-3);transition:var(--t);flex-shrink:0}
.ws-tab-close:hover{background:rgba(15,23,42,.08);color:var(--ink)}
.ws-tab--add{background:transparent;padding:8px 10px;color:var(--ink-3)}
.ws-tab--add:hover{background:rgba(15,23,42,.04);color:var(--ink)}

/* ── Resize Handles ── */
.ws-resize-handle{width:6px;cursor:col-resize;background:transparent;position:relative;flex-shrink:0;z-index:10;transition:background .15s}
.ws-resize-handle:hover,.ws-resize-handle.active{background:var(--line)}
.ws-resize-handle::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2px;height:28px;border-radius:2px;background:var(--ink-3);opacity:0;transition:opacity .15s}
.ws-resize-handle:hover::after,.ws-resize-handle.active::after{opacity:.5}

/* ── Notes Panel ── */
.ws-notes{background:linear-gradient(180deg,#FFFBEB 0%,#FFF8E0 100%);display:flex;flex-direction:column;flex:1;min-height:0}
.ws-notes-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 10px}
.ws-notes-title-wrap{display:flex;align-items:center;gap:8px}
.ws-notes-pen{color:var(--accent-notes);display:inline-flex}
.ws-notes-title{font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--accent-notes)}
.ws-notes-pagetabs{display:flex;align-items:center;gap:4px;padding:0 16px;border-bottom:1px solid rgba(245,158,11,.16)}
.ws-notes-pagetab{font-size:12.5px;padding:8px 12px;border-bottom:2px solid transparent;color:var(--ink-2);transition:var(--t);margin-bottom:-1px;border-radius:6px 6px 0 0}
.ws-notes-pagetab:hover{color:var(--ink);background:rgba(245,158,11,.08)}
.ws-notes-pagetab.active{color:var(--accent-notes);border-bottom-color:var(--accent-notes);font-weight:500}
.ws-notes-pagetab--add{padding:6px 8px;color:var(--accent-notes)}
.ws-notes-editor{flex:1;padding:18px 22px;overflow-y:auto;outline:none;font-size:14px;line-height:1.55;color:var(--ink);min-height:120px}
.ws-notes-editor:empty::before{content:'Notizen hier eingeben …';color:#c9a94e;font-style:italic;pointer-events:none}
.ws-notes-editor h3{font-size:14px;font-weight:600;margin:0 0 10px;color:var(--ink);letter-spacing:-.005em}
.ws-notes-editor p{margin:0 0 10px}
.ws-notes-editor ul{padding-left:20px;margin:0 0 12px}
.ws-notes-editor ul[data-checklist]{list-style:none;padding-left:0}
.ws-notes-editor ul[data-checklist] li{position:relative;padding-left:28px;margin-bottom:6px;cursor:pointer}
.ws-notes-editor ul[data-checklist] li::before{content:'';position:absolute;left:2px;top:4px;width:16px;height:16px;border:1.5px solid #d6c08a;border-radius:5px;background:#fff;transition:var(--t)}
.ws-notes-editor ul[data-checklist] li[data-checked="true"]::before{background:var(--accent-notes);border-color:var(--accent-notes)}
.ws-notes-editor ul[data-checklist] li[data-checked="true"]::after{content:'';position:absolute;left:6px;top:7px;width:8px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg)}
.ws-notes-editor ul[data-checklist] li[data-checked="true"]{color:var(--ink-3);text-decoration:line-through}
.ws-notes-editor [data-sitzung]{background:#fff;border:1px solid rgba(245,158,11,.25);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:10px}
.ws-notes-editor [data-participants]{display:inline-block;font-size:11px;font-weight:600;color:var(--accent-notes);background:rgba(245,158,11,.1);padding:3px 8px;border-radius:999px;margin-bottom:10px;letter-spacing:.04em}
.ws-notes-admin{margin:0 16px 16px;background:rgba(255,255,255,.7);border:1px solid rgba(245,158,11,.18);border-radius:var(--r-sm)}
.ws-notes-menu-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;color:var(--accent-notes);background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);transition:var(--t);cursor:pointer;font-family:inherit}
.ws-notes-menu-btn:hover{background:rgba(245,158,11,.18);border-color:rgba(245,158,11,.4)}
.ws-notes-admin .ws-collapse-head{padding:10px 14px;font-size:12px}
.ws-notes-menu{position:absolute;right:12px;top:44px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:var(--shadow-2);min-width:220px;z-index:20;animation:ws-fade-in 120ms ease;overflow:hidden}
.ws-notes-menu-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 14px;font-size:13px;color:var(--ink-2);text-align:left;transition:var(--t)}
.ws-notes-menu-item:hover{background:#F4F5F7;color:var(--ink)}
.ws-notes-menu-item.danger{color:#dc2626}
.ws-notes-menu-item.danger:hover{background:#fef2f2;color:#b91c1c}
.ws-notes-menu-sep{height:1px;background:var(--line-2);margin:4px 0}
.ws-admin-tree{list-style:none;padding:0 14px 12px 18px;margin:0;font-size:12.5px;color:var(--ink-2)}
.ws-admin-tree ul{list-style:none;padding-left:14px;border-left:1px dashed rgba(245,158,11,.35);margin:4px 0}
.ws-admin-tree em{color:var(--ink-3);font-style:normal}

/* ── Bucket Picker Modal ── */
.ws-bucketpicker{display:flex;flex-direction:column;gap:4px}
.ws-bucketpicker-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--r-sm);text-align:left;font-size:13.5px;transition:var(--t);cursor:pointer;width:100%}
.ws-bucketpicker-item:hover{background:#F4F5F7}

/* ── Avatar Cluster ── */
.ws-cluster{display:inline-flex;flex-shrink:0}

/* ── Settings Button ── */
.ws-settings-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;border-radius:var(--r-sm);font-size:13px;font-weight:500;color:var(--ink-2);transition:var(--t);text-align:left}
.ws-settings-btn:hover,.ws-settings-btn.active{background:#EDF1F7;color:var(--navy);font-weight:600}
.ws-settings-btn svg{flex-shrink:0}

/* ── Settings (inline, sidebar-nav + content) ── */
.ws-settings-header{display:flex;align-items:center;justify-content:space-between;padding:22px 28px 12px;flex-shrink:0;background:var(--card);border-bottom:1px solid var(--line-2);width:100%}
.ws-settings-title{font-size:20px;font-weight:700;margin:0;letter-spacing:-.015em}
.ws-settings-layout{display:flex;flex:1;min-height:0;width:100%}
.ws-settings-nav{width:220px;flex-shrink:0;background:var(--card);border-right:1px solid var(--line-2);padding:16px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.ws-settings-nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--r-sm);font-size:13px;font-weight:500;color:var(--ink-2);transition:var(--t);text-align:left;width:100%;cursor:pointer}
.ws-settings-nav-item:hover{background:#F4F5F7;color:var(--ink)}
.ws-settings-nav-item.active{background:#EDF1F7;color:var(--navy);font-weight:600}
.ws-settings-nav-icon{display:inline-flex;flex-shrink:0;width:20px;justify-content:center}
.ws-settings-body{flex:1;overflow-y:auto;padding:24px 28px 32px;width:100%}
@media(max-width:720px){.ws-settings-nav{display:none}.ws-settings-layout{flex-direction:column}}
.ws-settings-section{margin-bottom:24px}
.ws-settings-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);margin-bottom:12px}
.ws-settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line-2)}
.ws-settings-row:last-child{border-bottom:none}
.ws-settings-row-info{flex:1;min-width:0}
.ws-settings-row-label{font-size:13.5px;font-weight:500;color:var(--ink)}
.ws-settings-row-desc{font-size:12px;color:var(--ink-3);margin-top:2px}
.ws-toggle{width:40px;height:22px;border-radius:11px;background:#d1d5db;cursor:pointer;position:relative;transition:var(--t)}
.ws-toggle.on{background:var(--green)}
.ws-toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:var(--shadow-1);transition:var(--t)}
.ws-toggle.on::after{left:20px}
.ws-tpl-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:8px;transition:var(--t)}
.ws-tpl-card:hover{border-color:var(--navy);background:#F8FAFC}
.ws-tpl-modules{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.ws-tpl-module-chip{font-size:10px;padding:2px 7px;border-radius:6px;background:var(--line-2);color:var(--ink-2)}
.ws-tpl-actions{margin-left:auto;display:flex;gap:4px;flex-shrink:0}

/* ── Mobile Sidebar Drawer ── */
.ws-hamburger{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--ink-2);cursor:pointer;flex-shrink:0;transition:var(--t)}
.ws-hamburger:hover{background:#F4F5F7;color:var(--ink)}
.ws-drawer-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(8px);z-index:500}
.ws-drawer-overlay.open{display:block}
.ws-sidebar-drawer{position:fixed;top:0;right:0;bottom:0;width:280px;max-width:85vw;z-index:501;transform:translateX(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);box-shadow:-8px 0 40px rgba(0,0,0,.15)}
.ws-sidebar-drawer.open{transform:translateX(0)}
.ws-drawer-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--ink-2);z-index:1}
.ws-drawer-close:hover{background:#F4F5F7;color:var(--ink)}

/* ── Mobile View Toggle (3 Tabs: Eimer / Inhalt / Notizen) ── */
.ws-mobile-toggle{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--card);border-top:1px solid var(--line);padding:8px 12px calc(8px + env(safe-area-inset-bottom));box-shadow:0 -4px 16px rgba(0,0,0,.08)}
.ws-mobile-toggle-inner{display:flex;gap:0;background:#F0F2F5;border-radius:12px;padding:4px}
.ws-mobile-toggle-btn{flex:1;padding:10px 0;border-radius:9px;font-size:12px;font-weight:600;color:var(--ink-3);text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;transition:var(--t)}
.ws-mobile-toggle-btn.active{background:var(--card);color:var(--ink);box-shadow:var(--shadow-1)}

/* ── Responsive ── */
@media(max-width:1024px){
  .ws-notes-col{position:static;height:auto;width:100%!important;border-left:none;border-top:1px solid var(--line)}
  .ws-shell{flex-wrap:wrap}.ws-main{width:100%}.ws-resize-handle{display:none}
}
@media(max-width:720px){
  .ws-sidebar{display:none}
  .ws-hamburger{display:inline-flex}
  .ws-shell{min-height:auto;flex-wrap:nowrap;flex-direction:column}
  .ws-main{flex:1;min-height:0}
  .ws-bucket-header{flex-direction:column;padding:16px 16px 12px}
  .ws-bucket-title{font-size:18px}
  .ws-bucket-actions{align-self:stretch;display:flex;gap:6px}
  .ws-bucket-actions .ws-btn{flex:1;justify-content:center;padding:7px 8px;font-size:12px}
  .ws-bucket-meta{font-size:11px}
  .ws-content-scroll{padding:0 16px 80px}
  .ws-mod-grid{grid-template-columns:1fr}
  .ws-mod-tile{padding:12px}
  .ws-mod-tile-icon{width:36px;height:36px}
  .ws-mod-tile-name{font-size:13px}
  .ws-empty-cards{grid-template-columns:1fr}
  .ws-empty-hero{font-size:24px}
  .ws-empty-sub{font-size:13px}
  .ws-tabbar{padding:4px 8px 0}
  .ws-tab{padding:6px 8px;font-size:11.5px;max-width:160px}
  .ws-mobile-toggle{display:flex}
  .ws-notes-col{position:fixed!important;top:53px;left:0;right:0;bottom:calc(64px + env(safe-area-inset-bottom));width:100%!important;height:auto!important;z-index:60;border-left:none;border-radius:0;display:none!important;background:linear-gradient(180deg,#FFFBEB 0%,#FFF8E0 100%)}
  .ws-notes-col.mobile-show{display:flex!important}
  .ws-notes{flex:1;min-height:0}
  .ws-notes-editor{padding:14px 16px;font-size:13px}
  .ws-activity{padding:12px 14px}
  .ws-activity-item{font-size:12px}
  .ws-section-head-content{padding:8px 0 0}
  .ws-settings-layout{flex-direction:column}
  .ws-settings-nav{width:100%;flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line-2);padding:8px}
  .ws-settings-nav-item{white-space:nowrap;padding:8px 12px}
  .ws-settings-body{padding:16px}
  .ws-search-wrap{display:none}
}

<script>
(function(){

    user:'<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
    bucket:'<path d="M5 7h14l-1.4 12.2a2 2 0 0 1-2 1.8H8.4a2 2 0 0 1-2-1.8Z"/><path d="M5 7c0-2 3-4 7-4s7 2 7 4"/>',

    settings:'<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>'
  };
  function icon(name,size,sw){
    size=size||20;sw=sw||1.6;
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="'+sw+'" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[name]||'')+'</svg>';
  }

  // ── Bucket Type Config ──
  var TYPES={
    project:{label:'Bauprojekt',icon:'building',color:'#1e3a5f',ownerType:'org'},
    training:{label:'Übung',icon:'grad',color:'#3B82F6',ownerType:'choose'},
    'private':{label:'Privat',icon:'lock',color:'#64748b',ownerType:'personal'}
  };
  function typeIcon(type,size){var t=TYPES[type]||TYPES.project;return '<span style="color:'+t.color+';display:inline-flex">'+icon(t.icon,size||16)+'</span>';}

  // ── Module Catalogue (mit Kategorien) ──
  var MODULE_CATS=[
    {id:'sanitaer',label:'Sanitärberechnungen',icon:'droplet'},
    {id:'pm',label:'Projektmanagement',icon:'building'},
    {id:'hygiene',label:'Hygiene',icon:'gauge'},
    {id:'infra',label:'Infrastruktur',icon:'settings'}
  ];
  var MODULES=[
    {id:'sa_enthaertung',name:'Enthärtung',icon:'droplet',desc:'Wasserhärte-Berechnung',href:'sa_enthaertung.html',cat:'sanitaer'},
    {id:'sa_osmose',name:'Osmose',icon:'circle-dot',desc:'Umkehrosmose-Auslegung',href:'sa_osmose.html',cat:'sanitaer'},
    {id:'sb_lu_tabelle',name:'LU-Tabelle',icon:'table',desc:'Leistungs-/Umrechnung',href:'sb_lu_tabelle.html',cat:'sanitaer'},
    {id:'sb_druckerhoehung',name:'Druckerhöhung',icon:'arrow-up',desc:'Pumpen-Auslegung',href:'sb_druckerhoehung.html',cat:'sanitaer'},
    {id:'sb_warmwasser',name:'Warmwasser',icon:'database',desc:'Warmwasser-Speicher SIA 385',href:'sb_warmwasser.html',cat:'sanitaer'},
    {id:'sb_niederschlag',name:'Niederschlag',icon:'droplet',desc:'Niederschlagswasser',href:'sb_niederschlag.html',cat:'sanitaer'},
    {id:'sb_druckverlust',name:'Druckverlust',icon:'gauge',desc:'Druckverlust-Berechnung',href:'sb_druckverlust.html',cat:'sanitaer'},
    {id:'pm_objekte',name:'Objekte',icon:'building',desc:'Projektverwaltung',href:'pm_objekte.html',cat:'pm'},
    {id:'pm_terminplan',name:'Terminplan',icon:'table',desc:'Terminplanung',href:'pm_terminplan.html',cat:'pm'},
    {id:'pm_ausschreibung',name:'Ausschreibung',icon:'note',desc:'Ausschreibung & Offerten',href:'pm_ausschreibung.html',cat:'pm'},
    {id:'pm_abnahme',name:'Abnahmeprotokoll',icon:'check',desc:'Abnahme & Mängel',href:'pm_abnahme.html',cat:'pm'},
    {id:'hy_w12',name:'W12',icon:'gauge',desc:'SVGW W12 Selbstkontrolle',href:'hy_w12.html',cat:'hygiene'},
    {id:'if_werkzeug',name:'Werkzeuge',icon:'gauge',desc:'Werkzeugmanagement',href:'if_werkzeug.html',cat:'infra'},
    {id:'if_fahrzeug',name:'Fahrzeuge',icon:'arrow-up',desc:'Fahrzeugmanagement',href:'if_fahrzeug.html',cat:'infra'}
  ];

  // ── Objekt Chip ──
  function objektChip(b){
    if(!b.objektId)return '';
    var name=b.objektId;
    try{if(typeof GemaObjekte!=='undefined'){var o=(GemaObjekte.getAll()||[]).find(function(x){return x.id===b.objektId;});if(o)name=o.name||o.projektName||o.id;}}catch(e){}
    return '<div style="margin-bottom:4px"><a href="pm_objekte.html?objekt='+encodeURIComponent(b.objektId)+'" style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;font-size:11px;font-weight:600;text-decoration:none;transition:var(--t)" title="Objekt öffnen">'+icon('building',12)+' '+esc(name)+'</a></div>';
  }

  // ── Avatar Palette ──
  var AVATAR_COLORS=['#0c4a2e','#1e3a5f','#3B82F6','#7c3aed','#F59E0B','#10B981'];
  function avatar(initials,size,color){
    size=size||32;color=color||'#1e3a5f';
    return '<div class="ws-avatar" style="width:'+size+'px;height:'+size+'px;background:'+color+';font-size:'+(size*.4)+'px">'+esc(initials)+'</div>';
  }

  function avatarCluster(members,size){
    size=size||22;
    var html='<span class="ws-cluster">';
    var show=members.slice(0,3);
    for(var i=0;i<show.length;i++){
      html+='<div style="margin-left:'+(i===0?0:-8)+'px"><div class="ws-avatar" style="width:'+size+'px;height:'+size+'px;background:'+AVATAR_COLORS[i%AVATAR_COLORS.length]+';font-size:'+(size*.38)+'px;box-shadow:0 0 0 2px #fff,0 0 0 3px rgba(15,23,42,.12)">'+esc(show[i].slice(0,2))+'</div></div>';
    }
    if(members.length>3)html+='<div style="margin-left:-8px"><div class="ws-avatar" style="width:'+size+'px;height:'+size+'px;background:#E5E7EB;color:#475569;font-size:'+(size*.38)+'px;box-shadow:0 0 0 2px #fff">+'+String(members.length-3)+'</div></div>';
    return html+'</span>';
  }

  // ── Module KPIs ──
  var MODULE_KPIS={
    sa_enthaertung:{label:'Enthärtung',unit:'°fH',key:'gema_enthaertung',fields:['haerteRoh','haerteZiel','durchfluss'],format:function(d){if(!d)return null;var parts=[];if(d.haerteRoh)parts.push(d.haerteRoh+'°fH → '+(d.haerteZiel||'?')+'°fH');if(d.durchfluss)parts.push(d.durchfluss+' l/s');return parts.join(' · ')||null;}},
    sa_osmose:{label:'Osmose',key:'gema_osmose',format:function(d){if(!d)return null;var parts=[];if(d.permeat)parts.push('Permeat '+d.permeat+' l/s');if(d.recovery)parts.push('Recovery '+d.recovery+'%');return parts.join(' · ')||null;}},
    sb_druckerhoehung:{label:'Druck',key:'gema_druckerhoehung',format:function(d){if(!d)return null;var parts=[];if(d.volumenstrom)parts.push(d.volumenstrom+' l/s');if(d.foerderhoehe)parts.push(d.foerderhoehe+' m');return parts.join(' · ')||null;}},
    sb_lu_tabelle:{label:'LU',key:'gema_lu',format:function(d){if(!d)return null;if(d.verbraucher&&d.verbraucher.length)return d.verbraucher.length+' Verbraucher';return null;}},
    sb_warmwasser:{label:'WW',key:'gema_warmwasser',format:function(d){if(!d)return null;var parts=[];if(d.speichervolumen)parts.push(d.speichervolumen+' l');if(d.leistung)parts.push(d.leistung+' kW');return parts.join(' · ')||null;}},
    sb_niederschlag:{label:'NS',key:'gema_niederschlag',format:function(d){if(!d)return null;if(d.flaeche)return d.flaeche+' m²';return null;}},
    sb_druckverlust:{label:'DV',key:'gema_druckverlust',format:function(d){if(!d)return null;if(d.druckverlust)return d.druckverlust+' mbar';return null;}},
    hy_w12:{label:'W12',key:'gema_w12_v1',format:function(d){if(!d)return null;if(d.checks){var done=0,total=0;for(var k in d.checks){total++;if(d.checks[k])done++;}if(total)return done+'/'+total+' Punkte';}return null;}},
    pm_objekte:{label:'Obj',format:function(){try{if(typeof GemaObjekte!=='undefined'){var all=GemaObjekte.getAll();if(all&&all.length)return all.length+' Objekte';}}catch(e){}return null;}},
    pm_terminplan:{label:'TP',format:function(){return null;}},
    pm_ausschreibung:{label:'AS',format:function(){return null;}},
    pm_abnahme:{label:'AB',format:function(){return null;}},
    if_werkzeug:{label:'WZ',key:'gema_werkzeug',format:function(d){if(!d)return null;if(Array.isArray(d)){var defekte=d.filter(function(t){return t.berichte&&t.berichte.find(function(b){return b.typ==='defekt'&&!b.erledigt;});}).length;return d.length+' Geräte'+(defekte?' · '+defekte+' Defekte':'');}return null;}},
    if_fahrzeug:{label:'FZ',key:'gema_fahrzeug',format:function(d){if(!d)return null;if(Array.isArray(d))return d.length+' Fahrzeuge';return null;}}
  };

  function getModuleKpi(modId,objektId){
    var cfg=MODULE_KPIS[modId];if(!cfg)return null;
    if(cfg.format&&!cfg.key)return cfg.format(null);
    if(!cfg.key)return null;
    var storageKey=cfg.key;
    if(objektId&&typeof GemaObjekte!=='undefined'){
      try{storageKey=cfg.key+'__'+objektId;}catch(e){}
    }
    var data=null;
    try{
      var raw=localStorage.getItem(storageKey);
      if(!raw)raw=localStorage.getItem(cfg.key);
      if(raw)data=JSON.parse(raw);
    }catch(e){}
    try{return cfg.format(data);}catch(e){return null;}
  }

  function getBerechnungTimestamp(modId,objektId){
    try{
      if(typeof GemaObjekte==='undefined')return null;
      var idx=GemaObjekte.getBerechnungenForObjekt(objektId);
      var entry=idx.find(function(e){return e.modul===modId;});
      if(entry&&entry.lastModified){
        var d=new Date(entry.lastModified);
        return d.toLocaleDateString('de-CH')+' '+d.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'});
      }
    }catch(e){}
    return null;
  }

  // ── Storage ──
  function load(){try{var r=localStorage.getItem(KEY);if(r)buckets=JSON.parse(r);}catch(e){}}
  function save(){
    try{localStorage.setItem(KEY,JSON.stringify(buckets));}catch(e){}
    if(typeof _GemaDB!=='undefined'){try{_GemaDB.save(KEY,JSON.stringify(buckets));}catch(e){}}
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  // ── Toast ──
  function toast(text,iconName){
    var el=document.getElementById('wsToastRoot');
    el.innerHTML='<div class="ws-toast">'+(iconName?icon(iconName,14)+' ':'')+esc(text)+'</div>';
    clearTimeout(_toastTimer);
    _toastTimer=setTimeout(function(){el.innerHTML='';},2200);
  }

  // ── Modal Helpers ──
  function openModal(title,bodyHtml,maxW){
    var el=document.getElementById('wsModalRoot');
    el.innerHTML='<div class="ws-modal-backdrop" onclick="_wsCloseModal()">'
      +'<div class="ws-modal" style="max-width:'+(maxW||520)+'px" onclick="event.stopPropagation()">'
      +'<div class="ws-modal-header"><h2 class="ws-modal-title">'+esc(title)+'</h2>'
      +'<button class="ws-icon-btn" onclick="_wsCloseModal()">'+icon('x',16)+'</button></div>'
      +'<div class="ws-modal-body">'+bodyHtml+'</div></div></div>';
    setTimeout(function(){var inp=el.querySelector('.ws-input');if(inp)inp.focus();},60);
  }
  window._wsCloseModal=function(){document.getElementById('wsModalRoot').innerHTML='';};

  // ── New Bucket Modal ──
  var _newType='project';
  var _newOrg='';
  function _getOrgs(){
    var orgs=[];
    try{
      if(typeof GemaAuth!=='undefined'){
        var u=GemaAuth.getCurrentUser();
        if(u){
          var curOrg=GemaAuth.getCurrentOrg();
          if(curOrg)orgs.push({id:curOrg.id,short:(curOrg.name||'').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,3).toUpperCase(),name:curOrg.name||curOrg.id});
          if(typeof GemaAuth.getGastOrgs==='function'){
            var gast=GemaAuth.getGastOrgs(u.id)||[];
            gast.forEach(function(g){
              if(orgs.find(function(o){return o.id===g.orgId;}))return;
              orgs.push({id:g.orgId,short:(g.orgName||g.orgId||'').slice(0,3).toUpperCase(),name:g.orgName||g.orgId});
            });
          }
        }
      }
    }catch(e){}
    if(!orgs.length)orgs=[{id:'default',short:'Org',name:'Organisation'}];
    return orgs;
  }

  // ── Current User Helper ──
  function _curUser(){
    try{if(typeof GemaAuth!=='undefined')return GemaAuth.getCurrentUser();}catch(e){}
    return null;
  }
  function _curUserId(){var u=_curUser();return u?u.id:null;}
  function _curOrgId(){var u=_curUser();return u?u.orgId:'org_default';}
  function _isOrgAdmin(){
    try{if(typeof GemaAuth!=='undefined'&&typeof GemaAuth.isOrgAdmin==='function')return GemaAuth.isOrgAdmin(_curUserId());}catch(e){}
    var u=_curUser();return u&&u.roleIds&&u.roleIds.indexOf('role_admin')>=0;
  }

  // ── Bucket Sichtbarkeit ──
  function _canSeeBucket(b){
    var uid=_curUserId();var oid=_curOrgId();if(!uid)return true;
    if(b.ownerType==='personal')return b.createdBy===uid;
    if(b.accessControl&&b.accessControl.revokedUsers&&b.accessControl.revokedUsers.indexOf(uid)>=0)return false;

  // ── Auto-Status: Erkennung aus localStorage ──
  var NO_AUTO_STATUS=['hy_w12','if_werkzeug','if_fahrzeug'];
  var ANLAGE_MODULES=['sa_enthaertung','sa_osmose','sb_druckerhoehung'];

  function _wsAutoStatus(modId,objektId){
    if(NO_AUTO_STATUS.indexOf(modId)>=0)return 'offen';
    var baseKeys={
      sa_enthaertung:'gema_enthaertung',sa_osmose:'gema_osmose',
      sb_druckerhoehung:'gema_druckerhoehung',sb_lu_tabelle:'gema_lu',
      sb_warmwasser:'gema_warmwasser',sb_niederschlag:'gema_niederschlag',
      sb_druckverlust:'gema_druckverlust',
      pm_objekte:null,pm_terminplan:null,pm_ausschreibung:null,pm_abnahme:null
    };
    var base=baseKeys[modId];if(base===undefined)return 'offen';
    if(base===null)return 'offen';

    var sk=objektId?base+'__'+objektId:base;
    var data=null;
    try{var raw=localStorage.getItem(sk);if(!raw)raw=localStorage.getItem(base);if(raw)data=JSON.parse(raw);}catch(e){}
    if(!data)return 'offen';

    if(ANLAGE_MODULES.indexOf(modId)>=0){
      var anlKey=base+'_anlage';
      var anlSk=objektId?anlKey+'__'+objektId:anlKey;
      var hasAnlage=false;
      try{var ar=localStorage.getItem(anlSk);if(!ar)ar=localStorage.getItem(anlKey);if(ar&&ar!=='null'&&ar!=='""')hasAnlage=true;}catch(e){}
      var hasOfferte=false;
      try{var ofKey=base+'_offerte';var ofSk=objektId?ofKey+'__'+objektId:ofKey;var ofr=localStorage.getItem(ofSk);if(!ofr)ofr=localStorage.getItem(ofKey);if(ofr&&ofr!=='null')hasOfferte=true;}catch(e){}
      if(hasOfferte)return 'Offerte angefragt';
      if(hasAnlage)return 'Anlage gewählt';
    }

    var hasValues=false;var hasResult=false;
    if(modId==='sa_enthaertung'){
      hasValues=!!(data.haerteRoh||data.durchfluss);
      hasResult=!!(data.haerteRoh&&data.haerteZiel&&data.durchfluss);
    }else if(modId==='sa_osmose'){
      hasValues=!!(data.zulaufTDS||data.volumenstrom);
      hasResult=!!(data.permeat||data.recovery);
    }else if(modId==='sb_druckerhoehung'){
      hasValues=!!(data.volumenstrom||data.geodaetisch);
      hasResult=!!(data.volumenstrom&&data.foerderhoehe);
    }else if(modId==='sb_lu_tabelle'){
      hasValues=data.verbraucher&&data.verbraucher.length>0;
      hasResult=data.verbraucher&&data.verbraucher.length>0&&!!data.spitzenvolumenstrom;
    }else if(modId==='sb_warmwasser'){
      hasValues=!!(data.zapfstellen||data.personen);
      hasResult=!!(data.speichervolumen||data.leistung);
    }else if(modId==='sb_niederschlag'){
      hasValues=!!(data.flaeche||data.abflussbeiwert);
      hasResult=!!(data.flaeche&&data.abflussbeiwert);
    }else if(modId==='sb_druckverlust'){
      hasValues=!!(data.durchmesser||data.laenge);
      hasResult=!!(data.druckverlust);
    }else{
      var keys=Object.keys(data);
      hasValues=keys.length>0;
      hasResult=keys.length>2;
    }

    if(hasResult)return 'berechnet';
    if(hasValues)return 'in Bearbeitung';
    return 'offen';
  }

  window._wsNoteInsert=function(type){
    var ed=document.getElementById('wsNoteEditor');if(!ed)return;
    var html='';
    var now=new Date();
    var dateStr=now.toLocaleDateString('de-CH')+' '+now.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'});
    if(type==='checklist'){
      html='<ul data-checklist><li data-checked="false">Neue Aufgabe</li><li data-checked="false">Weitere Aufgabe</li></ul>';
    }else if(type==='heading'){
      html='<h3>Neue Überschrift</h3>';
    }else if(type==='divider'){
      html='<hr style="border:none;border-top:1px solid rgba(245,158,11,.25);margin:16px 0">';
    }else if(type==='timestamp'){
      html='<p><strong>'+dateStr+'</strong></p>';
    }else if(type==='sitzung'){
      var user='Du';
      try{if(typeof GemaAuth!=='undefined'){var u=GemaAuth.getCurrentUser();if(u)user=u.name||'Du';}}catch(e){}
      html='<div data-sitzung><h3>Sitzung '+now.toLocaleDateString('de-CH')+'</h3>'
        +'<div data-participants>'+esc(user)+'</div>'
        +'<p><strong>Themen:</strong></p><ul><li>Thema 1</li><li>Thema 2</li></ul>'
        +'<p><strong>Beschlüsse:</strong></p><ul><li>—</li></ul>'
        +'<p><strong>Nächste Sitzung:</strong> —</p></div>';
    }
    ed.focus();
    document.execCommand('insertHTML',false,html);
    _wsNoteInput();
    document.getElementById('wsNotesMenu').style.display='none';
    toast(type==='checklist'?'Checkliste eingefügt':type==='sitzung'?'Sitzungsnotiz eingefügt':'Eingefügt','check');

  window._wsNoteDeletePage=function(){
    var b=buckets.find(function(x){return x.id===activeTab;});if(!b||b.notes.length<=1)return;
    var p=b.notes.find(function(n){return n.id===_activeNotePageId;});
    if(!p)return;
    var title=p.title;
    b.notes=b.notes.filter(function(n){return n.id!==_activeNotePageId;});
    _activeNotePageId=b.notes[0]?b.notes[0].id:null;
    save();renderNotes();
    toast('Seite „'+title+'" gelöscht','x');
    document.getElementById('wsNotesMenu').style.display='none';
  };

  window._wsNotePageDuplicate=function(){
    var b=buckets.find(function(x){return x.id===activeTab;});if(!b)return;
    var p=b.notes.find(function(n){return n.id===_activeNotePageId;});if(!p)return;
    var id='n'+Math.random().toString(36).slice(2,6);
    b.notes.push({id:id,title:p.title+' (Kopie)',body:p.body});

  window._wsNoteExport=function(){
    var ed=document.getElementById('wsNoteEditor');if(!ed)return;
    var text=ed.innerText||'';
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){toast('Notizen in Zwischenablage kopiert','check');});
    }else{
      var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
      toast('Notizen in Zwischenablage kopiert','check');
    }
    document.getElementById('wsNotesMenu').style.display='none';
  };

  // ── Auto-Objekt: Jeder Eimer bekommt automatisch ein Objekt ──
  function _wsEnsureObjekt(b){
    if(b.objektId)return b.objektId;
    var objId='obj_ws_'+b.id;
    var curUser=null;
    try{if(typeof GemaAuth!=='undefined')curUser=GemaAuth.getCurrentUser();}catch(e){}
    var newObj={id:objId,name:b.name,strasse:'',plz:'',ort:'',
      bauvorhaben:(TYPES[b.type]||TYPES.project).label,status:'aktiv',
      orgId:curUser?curUser.orgId:'org_default',
      erstelltVon:curUser?curUser.id:'',
      createdAt:b.createdAt||new Date().toISOString()};
    try{
      var raw=localStorage.getItem('gema_objekte_v1');
      var data=raw?JSON.parse(raw):{objekte:[],beteiligte:[],activeObjektId:null};
      if(!data.objekte.find(function(o){return o.id===objId;})){
        data.objekte.push(newObj);
        localStorage.setItem('gema_objekte_v1',JSON.stringify(data));
      }
    }catch(e){}
    b.objektId=objId;
    save();
    return objId;
  }

  function renderSidebar(){
    var visible=buckets.filter(_canSeeBucket);

    orgBuckets=filterOrg(orgBuckets);

    function renderList(list,emptyText){
      var vis=list.slice(0,list._expanded?999:5);
      var html=vis.length?vis.map(bucketRowHtml).join(''):'<div class="ws-empty-hint">'+emptyText+'</div>';

      return html;

    var lbl=document.getElementById('wsOrgLabel');if(lbl)lbl.textContent=orgName;
    document.getElementById('wsOrgBuckets').innerHTML=renderList(orgBuckets,'Keine Org-Eimer');

  // ── Mobile View Toggle (Eimer / Content / Notes) ──
  var _mobileView='content';
  window._wsMobileView=function(view){
    _mobileView=view;
    var notesCol=document.getElementById('wsNotesCol');
    var contentArea=document.getElementById('wsContentArea');
    var tabBar=document.getElementById('wsTabBar');
    var btnS=document.getElementById('wsMobSidebar');
    var btnC=document.getElementById('wsMobContent');
    var btnN=document.getElementById('wsMobNotes');
    if(btnS)btnS.classList.toggle('active',view==='sidebar');
    if(btnC)btnC.classList.toggle('active',view==='content');
    if(btnN)btnN.classList.toggle('active',view==='notes');
    // Sidebar-Drawer
    var overlay=document.getElementById('wsDrawerOverlay');
    var drawer=document.getElementById('wsDrawerSidebar');
    if(view==='sidebar'){
      if(overlay)overlay.classList.add('open');
      if(drawer){drawer.classList.add('open');renderDrawer();}
      if(notesCol)notesCol.classList.remove('mobile-show');
      if(contentArea)contentArea.style.display='flex';
      return;
    }else{
      if(overlay)overlay.classList.remove('open');
      if(drawer)drawer.classList.remove('open');
    }
    if(view==='notes'){
      if(notesCol)notesCol.classList.add('mobile-show');
      if(contentArea)contentArea.style.display='none';
      if(tabBar)tabBar.style.display='none';
    }else{
      if(notesCol)notesCol.classList.remove('mobile-show');
      if(contentArea)contentArea.style.display='flex';
      if(tabBar&&openTabs.length)tabBar.style.display='';
    }
  };

  window._wsToggleDrawer=function(open){

    else{

          +'<input type="checkbox" value="'+m.id+'"'+(chk?' checked':'')+' style="width:16px;height:16px;accent-color:var(--navy)">'
          +'<span style="color:var(--navy);display:inline-flex">'+icon(m.icon,16)+'</span>'

  window._wsNewTemplate=function(){
    var body='<div class="ws-form">'
      +'<div class="ws-form-field"><label>Vorlagen-Name</label>'
      +'<input class="ws-input" id="wsTplName" placeholder="z.B. Standard Sanitärprojekt"></div>'
      +'<div class="ws-form-field"><label>Module auswählen & sortieren</label>'
      +'<div style="display:flex;flex-direction:column;gap:2px;max-height:350px;overflow-y:auto" id="wsTplModules">'
      +_tplModuleList([])+'</div></div>'
      +'<div class="ws-form-actions"><button class="ws-btn ws-btn-ghost" onclick="_wsCloseModal()">Abbrechen</button>'
      +'<button class="ws-btn ws-btn-primary" onclick="_wsSaveTemplate(-1)">Vorlage speichern</button></div></div>';
    openModal('Neue Vorlage',body,520);
  };
  window._wsEditTemplate=function(idx){
    var templates=loadTemplates();var tpl=templates[idx];if(!tpl)return;
    var body='<div class="ws-form">'
      +'<div class="ws-form-field"><label>Vorlagen-Name</label>'
      +'<input class="ws-input" id="wsTplName" value="'+esc(tpl.name)+'"></div>'
      +'<div class="ws-form-field"><label>Module auswählen & sortieren</label>'
      +'<div style="display:flex;flex-direction:column;gap:2px;max-height:350px;overflow-y:auto" id="wsTplModules">'
      +_tplModuleList(tpl.modules)+'</div></div>'
      +'<div class="ws-form-actions"><button class="ws-btn ws-btn-ghost" onclick="_wsCloseModal()">Abbrechen</button>'
      +'<button class="ws-btn ws-btn-primary" onclick="_wsSaveTemplate('+idx+')">Speichern</button></div></div>';
    openModal('Vorlage bearbeiten',body,520);
  };
  window._wsSaveTemplate=function(idx){
    var name=(document.getElementById('wsTplName')||{}).value;
    if(!name||!name.trim())return;
    var checks=document.querySelectorAll('#wsTplModules input[type=checkbox]:checked');
    var mods=[];for(var i=0;i<checks.length;i++)mods.push(checks[i].value);
    if(!mods.length){toast('Mindestens ein Modul auswählen','x');return;}
    var templates=loadTemplates();
    var tpl={name:name.trim(),modules:mods};
    if(idx>=0&&idx<templates.length)templates[idx]=tpl;
    else templates.push(tpl);
    saveTemplates(templates);_wsCloseModal();_renderSettings();
    toast('Vorlage gespeichert','check');
  };
  window._wsDeleteTemplate=function(idx){
    var templates=loadTemplates();
    templates.splice(idx,1);
    saveTemplates(templates);_renderSettings();
    toast('Vorlage gelöscht','x');
  };

  // ── Drag & Drop: Module im Eimer ──
  var _dragIdx=null;
  window._wsDragStart=function(e,idx){_dragIdx=idx;e.target.classList.add('dragging');e.dataTransfer.effectAllowed='move';};
  window._wsDragOver=function(e){e.preventDefault();e.dataTransfer.dropEffect='move';};
  window._wsDragEnter=function(e){var t=e.target.closest('.ws-mod-tile');if(t)t.classList.add('drag-over');};
  window._wsDragLeave=function(e){var t=e.target.closest('.ws-mod-tile');if(t)t.classList.remove('drag-over');};
  window._wsDragEnd=function(e){e.target.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(function(el){el.classList.remove('drag-over');});};
  window._wsDrop=function(e,toIdx){
    e.preventDefault();
    var t=e.target.closest('.ws-mod-tile');if(t)t.classList.remove('drag-over');
    if(_dragIdx===null||_dragIdx===toIdx)return;
    var b=buckets.find(function(x){return x.id===activeTab;});if(!b)return;
    var item=b.modules.splice(_dragIdx,1)[0];
    b.modules.splice(toIdx,0,item);
    _dragIdx=null;
    save();renderContent();
  };

  // ── Drag & Drop: Vorlagen-Module ──
  var _tplDragIdx=null;
  window._wsTplDragStart=function(e,idx){_tplDragIdx=idx;e.target.classList.add('dragging');e.dataTransfer.effectAllowed='move';};
  window._wsTplDragOver=function(e){e.preventDefault();};
  window._wsTplDragEnter=function(e){var t=e.target.closest('.ws-tpl-drag-item');if(t)t.classList.add('drag-over');};
  window._wsTplDragLeave=function(e){var t=e.target.closest('.ws-tpl-drag-item');if(t)t.classList.remove('drag-over');};
  window._wsTplDragEnd=function(e){e.target.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(function(el){el.classList.remove('drag-over');});};
  window._wsTplDrop=function(e,toIdx){
    e.preventDefault();
    var t=e.target.closest('.ws-tpl-drag-item');if(t)t.classList.remove('drag-over');
    if(_tplDragIdx===null||_tplDragIdx===toIdx)return;
    var list=document.querySelectorAll('#wsTplModules input[type=checkbox]');
    var items=[];list.forEach(function(cb){items.push({id:cb.value,checked:cb.checked});});
    var item=items.splice(_tplDragIdx,1)[0];
    items.splice(toIdx,0,item);
    _tplDragIdx=null;
    var container=document.getElementById('wsTplModules');if(!container)return;
    var labels=container.querySelectorAll('label');
    var sorted=[];items.forEach(function(it){
      for(var i=0;i<labels.length;i++){if(labels[i].querySelector('input').value===it.id){sorted.push(labels[i]);break;}}
    });
    container.innerHTML='';sorted.forEach(function(l){container.appendChild(l);});
  };

  // ── Search ──
  window._wsSearch=function(q){
    var res=document.getElementById('wsSearchResults');
    q=(q||'').trim().toLowerCase();
    if(!q){res.style.display='none';return;}
    var hits=[];
    buckets.forEach(function(b){
      if(b.name.toLowerCase().indexOf(q)>=0)hits.push({type:'bucket',id:b.id,name:b.name,sub:(TYPES[b.type]||TYPES.project).label,icon:TYPES[b.type]?TYPES[b.type].icon:'building'});
    });
    MODULES.forEach(function(m){
      if(m.name.toLowerCase().indexOf(q)>=0||m.desc.toLowerCase().indexOf(q)>=0)hits.push({type:'module',id:m.id,name:m.name,sub:m.desc,icon:m.icon,href:m.href});
    });
    if(!hits.length){res.innerHTML='<div class="ws-search-item" style="color:var(--ink-3)">Keine Treffer</div>';res.style.display='';return;}
    res.innerHTML=hits.slice(0,8).map(function(h){
      if(h.type==='bucket')return '<button class="ws-search-item" onclick="_wsOpen(\''+h.id+'\');_wsSearchClose()"><span style="color:'+(TYPES[h.icon]||{color:'#1e3a5f'}).color+';display:inline-flex">'+icon(h.icon,16)+'</span><div><div>'+esc(h.name)+'</div><div class="ws-search-item-sub">'+esc(h.sub)+'</div></div></button>';
      return '<a class="ws-search-item" href="'+h.href+'" onclick="_wsSearchClose()"><div style="color:var(--navy);display:inline-flex">'+icon(h.icon,16)+'</div><div><div>'+esc(h.name)+'</div><div class="ws-search-item-sub">'+esc(h.sub)+'</div></div></a>';
    }).join('');
    res.style.display='';
  };
  window._wsSearchClose=function(){
    document.getElementById('wsSearchResults').style.display='none';
    document.getElementById('wsSearchInput').value='';
  };
  document.addEventListener('click',function(e){
    if(!e.target.closest('.ws-search-wrap'))_wsSearchClose();
  });

  // ── Keyboard Shortcuts ──
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'){
      var modal=document.getElementById('wsModalRoot');
      if(modal&&modal.innerHTML){_wsCloseModal();return;}
      _wsSearchClose();
    }
    if((e.metaKey||e.ctrlKey)&&e.key==='k'){
      e.preventDefault();
      var inp=document.getElementById('wsSearchInput');
      if(inp)inp.focus();
    }
  });

  // ── Tab Persistence ──
  function saveTabs(){try{sessionStorage.setItem('ws_tabs',JSON.stringify({open:openTabs,active:activeTab}));}catch(e){}}
  function loadTabs(){
    try{
      var r=sessionStorage.getItem('ws_tabs');
      if(r){var d=JSON.parse(r);openTabs=d.open||[];activeTab=d.active||null;}
      openTabs=openTabs.filter(function(id){return buckets.find(function(b){return b.id===id;});});
      if(activeTab&&!buckets.find(function(b){return b.id===activeTab;}))activeTab=openTabs[0]||null;
    }catch(e){}
  }
  var _origSave=save;
  save=function(){_origSave();saveTabs();};

  // ── Einladen Modal ──
  function _getOrgUsers(){
    var users=[];
    try{if(typeof GemaAuth!=='undefined'){users=GemaAuth.getUsers()||[];}}catch(e){}
    return users.filter(function(u){return u.active;});
  }
  function _initials(name){return(name||'').split(' ').map(function(s){return s[0]||'';}).join('').slice(0,2).toUpperCase()||'??';}

  window._wsInvite=function(){
    var b=buckets.find(function(x){return x.id===activeTab;});if(!b)return;
    var curUser=null;
    try{if(typeof GemaAuth!=='undefined')curUser=GemaAuth.getCurrentUser();}catch(e){}
    var myOrg=curUser?curUser.orgId:'org_default';
    var allUsers=_getOrgUsers();
    var orgUsers=allUsers.filter(function(u){return u.orgId===myOrg;});
    var existingIds=(b.beteiligte||[]).map(function(p){return p.userId||'';}).filter(Boolean);

    var orgListHtml=orgUsers.length?orgUsers.map(function(u){
      var already=existingIds.indexOf(u.id)>=0;
      var role=u.roleIds&&u.roleIds[0]?u.roleIds[0].replace('role_','').replace(/_/g,' '):'';
      return '<button class="ws-modpicker-item'+(already?' disabled':'')+'" '
        +(already?'disabled':'onclick="_wsAddOrgUser(\''+u.id+'\')"')+'>'
        +avatar(_initials(u.name),36,AVATAR_COLORS[orgUsers.indexOf(u)%AVATAR_COLORS.length])
        +'<div style="flex:1;min-width:0"><div class="ws-modpicker-name">'+esc(u.name)+'</div>'
        +'<div class="ws-modpicker-desc">'+esc(role)+'</div></div>'
        +(already?'<span class="ws-modpicker-tag">bereits hinzugefügt</span>':'')
        +'</button>';
    }).join(''):'<div class="ws-empty-hint">Keine Benutzer in deiner Organisation</div>';

    var body='<div style="display:flex;flex-direction:column;gap:16px">'
      +'<div><div class="ws-settings-section-title" style="margin-bottom:8px">Organisation</div>'
      +'<div class="ws-modpicker" style="max-height:240px">'+orgListHtml+'</div></div>'
      +'<div style="border-top:1px solid var(--line);padding-top:16px">'
      +'<div class="ws-settings-section-title" style="margin-bottom:8px">Extern hinzufügen</div>'
      +'<div class="ws-form">'
      +'<div style="display:flex;gap:8px;flex-wrap:wrap">'
      +'<input class="ws-input" id="wsExtName" placeholder="Name" style="flex:1;min-width:140px">'
      +'<select class="ws-input" id="wsExtRole" style="width:auto;cursor:pointer">'
      +'<option value="Architekt">Architekt</option>'
      +'<option value="Bauherr">Bauherr</option>'
      +'<option value="Behörde">Behörde</option>'
      +'<option value="Berater">Berater</option>'
      +'<option value="Elektro">Elektroplaner</option>'
      +'<option value="HLKK">HLKK-Planer</option>'
      +'<option value="Unternehmer">Unternehmer</option>'
      +'<option value="Sonstige">Sonstige</option></select></div>'
      +'<div style="display:flex;gap:8px">'
      +'<input class="ws-input" id="wsExtOrg" placeholder="Firma (optional)" style="flex:1">'
      +'<button class="ws-btn ws-btn-primary" onclick="_wsAddExternal()">Hinzufügen</button></div></div></div></div>';
    openModal('Beteiligte einladen',body,560);
  };

  window._wsAddOrgUser=function(userId){
    var b=buckets.find(function(x){return x.id===activeTab;});if(!b)return;
    var allUsers=_getOrgUsers();
    var u=allUsers.find(function(x){return x.id===userId;});if(!u)return;
    var role=u.roleIds&&u.roleIds[0]?u.roleIds[0].replace('role_','').replace(/_/g,' '):'Mitglied';
    var orgName='';
    try{if(typeof GemaAuth!=='undefined'){var o=GemaAuth.getCurrentOrg();if(o)orgName=o.name||o.id;}}catch(e){}
    b.members.push(_initials(u.name));
    b.beteiligte.push({userId:u.id,role:role,name:u.name,org:orgName,intern:true});
    if(!b.accessControl)b.accessControl={orgVisible:true,invitedUsers:[],revokedUsers:[]};
    if(b.accessControl.invitedUsers.indexOf(u.id)<0)b.accessControl.invitedUsers.push(u.id);
    var uName='Du';try{var cu=_curUser();if(cu)uName=cu.name||'Du';}catch(e){}
    b.activity.unshift({who:uName,text:'hat '+u.name+' hinzugefügt',when:'gerade eben'});
    _wsCloseModal();save();render();
    toast(u.name+' hinzugefügt','check');
  };

  window._wsAddExternal=function(){
    var name=(document.getElementById('wsExtName')||{}).value;
    var role=(document.getElementById('wsExtRole')||{}).value;
    var org=(document.getElementById('wsExtOrg')||{}).value;
    if(!name||!name.trim())return;
    name=name.trim();
    var b=buckets.find(function(x){return x.id===activeTab;});if(!b)return;
    b.members.push(_initials(name));
    b.beteiligte.push({role:role||'Sonstige',name:name,org:(org||'').trim(),intern:false});
    b.activity.unshift({who:'Du',text:'hat '+name+' ('+role+') hinzugefügt',when:'gerade eben'});
    _wsCloseModal();save();render();
    toast(name+' hinzugefügt','check');
  };

  window._wsRemoveBet=function(idx){
    var b=buckets.find(function(x){return x.id===activeTab;});if(!b)return;
    var p=b.beteiligte[idx];if(!p)return;
    var body='<p class="ws-confirm-text">«'+esc(p.name)+'» ('+(p.intern?'intern':'extern')+') aus den Beteiligten entfernen?</p>'
      +'<div class="ws-form-actions"><button class="ws-btn ws-btn-ghost" onclick="_wsCloseModal()">Abbrechen</button>'
      +'<button class="ws-btn ws-btn-danger" onclick="_wsDoRemoveBet('+idx+')">Entfernen</button></div>';
    openModal('Beteiligten entfernen',body,420);
  };
  window._wsDoRemoveBet=function(idx){
    var b=buckets.find(function(x){return x.id===activeTab;});if(!b)return;
    var p=b.beteiligte[idx];if(!p)return;
    b.beteiligte.splice(idx,1);
    var ini=_initials(p.name);
    var mi=b.members.indexOf(ini);
    if(mi>=0)b.members.splice(mi,1);
    b.activity.unshift({who:'Du',text:'hat '+p.name+' entfernt',when:'gerade eben'});
    save();renderContent();
    toast(p.name+' entfernt','x');
  };

  // ── Teilen Modal ──
  window._wsShare=function(){
    var b=buckets.find(function(x){return x.id===activeTab;});if(!b)return;
    var body='<div class="ws-form">'
      +'<p style="font-size:13px;color:var(--ink-2);margin-bottom:12px">Eimer «'+esc(b.name)+'» für andere sichtbar machen.</p>'
      +'<div class="ws-form-field"><label>Status</label>'
      +'<div style="display:flex;gap:8px">'
      +'<button class="ws-type-card'+(b.shared?' active':'')+'" style="flex:1" onclick="_wsDoShare(true)">'+icon('users',18)+'<span>Geteilt</span></button>'
      +'<button class="ws-type-card'+(!b.shared?' active':'')+'" style="flex:1" onclick="_wsDoShare(false)">'+icon('lock',18)+'<span>Privat</span></button>'
      +'</div></div>'
      +(b.members.length>1?'<div class="ws-form-field"><label>Mitglieder ('+b.members.length+')</label><div style="display:flex;flex-wrap:wrap;gap:6px">'+b.members.map(function(m,i){return avatar(m,28,AVATAR_COLORS[i%AVATAR_COLORS.length]);}).join('')+'</div></div>':'')
      +'<div class="ws-form-actions"><button class="ws-btn ws-btn-ghost" onclick="_wsCloseModal()">Schliessen</button></div></div>';
    openModal('Eimer teilen',body,480);
  };
  window._wsDoShare=function(shared){
    var b=buckets.find(function(x){return x.id===activeTab;});if(!b)return;
    b.shared=shared;
    b.activity.unshift({who:'Du',text:shared?'Eimer geteilt':'Eimer auf privat gesetzt',when:'gerade eben'});
    _wsCloseModal();save();render();
    toast(shared?'Eimer ist jetzt geteilt':'Eimer ist jetzt privat',shared?'share':'lock');
  };

  // ── Resize Panels ──
  function initResize(handleId,getTarget,side){
    var handle=document.getElementById(handleId);if(!handle)return;
    var dragging=false,startX=0,startW=0,target=null;
    handle.addEventListener('mousedown',function(e){
      target=typeof getTarget==='function'?getTarget():document.getElementById(getTarget);
      if(!target)return;
      dragging=true;startX=e.clientX;startW=target.offsetWidth;
      handle.classList.add('active');
      document.body.style.cursor='col-resize';document.body.style.userSelect='none';
      e.preventDefault();
    });
    document.addEventListener('mousemove',function(e){
      if(!dragging)return;
      var delta=e.clientX-startX;
      var newW=side==='left'?startW+delta:startW-delta;
      newW=Math.max(200,Math.min(500,newW));
      target.style.width=newW+'px';
    });
    document.addEventListener('mouseup',function(){
      if(!dragging)return;
      dragging=false;handle.classList.remove('active');
      document.body.style.cursor='';document.body.style.userSelect='';
    });
  }

  // ── Init ──
  load();loadTabs();render();
  initResize('wsResizeSidebar','wsSidebar','left');
  initResize('wsResizeNotes','wsNotesCol','right');
})();
</script>
<script>

  if(typeof GemaFeedback!=='undefined')GemaFeedback.init('workspace','Workspace');
  try{
    var u=GemaAuth.getCurrentUser();
    if(u){
      var isAdmin=u.roleIds&&u.roleIds.indexOf('role_admin')>=0;
      var isOrgA=(typeof GemaAuth.isOrgAdmin==='function')&&GemaAuth.isOrgAdmin(u.id);

      {selector:'.ws-search',title:'Schnelle Suche',text:'Suche blitzschnell nach Eimern oder Modulen. Tippe einfach den Namen ein — Ergebnisse erscheinen sofort als Dropdown.',placement:'bottom',icon:'🔍'},
      {selector:'#wsSettingsBtn',title:'Einstellungen & Vorlagen',text:'Hier findest du alle Workspace-Einstellungen: Darstellung, Sprache, Benachrichtigungen. Unter «Eimer & Vorlagen» erstellst du Modul-Vorlagen, die bei neuen Eimern automatisch geladen werden.',placement:'right',icon:'⚙️'},
      {selector:'#wsTabBar',title:'Tab-Leiste',text:'Öffne mehrere Eimer gleichzeitig als Tabs — wie im Browser. Klicke auf einen Tab zum Wechseln, auf × zum Schliessen. Das + öffnet weitere Eimer.',placement:'bottom',icon:'📑'},
      {selector:'.ws-bucket-title',title:'Eimer umbenennen',text:'Klicke direkt auf den Titel, um ihn zu bearbeiten. Enter speichert, Escape bricht ab.',placement:'bottom',icon:'✏️'},
      {selector:'.ws-bucket-actions',title:'Einladen & Teilen',text:'«Einladen» zeigt dir alle Benutzer deiner Organisation und lässt dich externe Beteiligte (Architekten, Bauherren etc.) hinzufügen. «Teilen» macht den Eimer für andere sichtbar.',placement:'bottom',icon:'👥'},
      {selector:'.ws-mod-grid,.ws-mod-hero',title:'Module hinzufügen',text:'Füge Berechnungsmodule hinzu — einzeln oder per Vorlage. Jede Kachel zeigt live KPIs aus deinen Berechnungen. Klicke auf den Status-Punkt, um zwischen offen, in Bearbeitung und berechnet zu wechseln.',placement:'bottom',icon:'📊'},
      {selector:'#wsNotesCol,.ws-notes',title:'Notizen & Pendenzen',text:'Das Notizfeld rechts funktioniert wie OneNote: Schreibe frei, füge Checklisten ein, erstelle Sitzungsnotizen. Nutze die Seiten-Tabs für verschiedene Themen. Das ⋮-Menü bietet weitere Optionen.',placement:'left',icon:'📝'},
      {selector:'#wsResizeSidebar',title:'Spaltenbreite anpassen',text:'Ziehe an den dünnen Trennlinien zwischen den Bereichen, um die Breite von Sidebar und Notizen nach deinem Bedarf anzupassen.',placement:'right',icon:'↔️'},
      {selector:'.gema-feedback-btn',title:'Feedback & Hilfe',text:'Siehst du einen Fehler oder hast eine Idee? Klicke auf Feedback, mache einen Screenshot und markiere die Stelle — wir sehen alles direkt.',placement:'left',icon:'💬'}
    ];
    GemaCoachmarks.init('sys_workspace_v2',steps,{delay:900});
  }
});
</script>
<script src="gema_coachmarks.js"></script>
