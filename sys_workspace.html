<!doctype html>
<html lang="de">
<head>
<script src="gema_auth.js"></script>
<script src="gema_recent.js"></script>
<meta charset="utf-8"/>
<meta name="theme-color" content="#0f172a"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<title>GEMA – Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f4f6fb;--bg2:#edf0f7;--sur:#fff;--brd:#e2e7f0;--brd2:#cdd4e4;--txt:#111827;--txt2:#374151;--mut:#6b7280;--mut2:#9ca3af;--plan:#7c3aed;--plan-bg:#fdf4ff;--plan-bd:#c4b5fd;--grn:#16a34a;--grn-bg:#f0fdf4;--red:#dc2626;--r:14px;--sh-sm:0 1px 4px rgba(0,0,0,.07);--sh:0 4px 16px rgba(0,0,0,.08);--sans:"DM Sans",system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);min-height:100vh}
input,select,button,textarea{font-family:var(--sans)}
input::placeholder{color:#cbd5e1}
.g-nav{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--brd);box-shadow:var(--sh-sm)}
.nav-in{max-width:1440px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center;gap:12px}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0}
.nav-logo svg{height:28px}
.nav-back{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;border:1px solid var(--brd2);background:var(--sur);color:var(--txt2);font-size:12.5px;font-weight:600;text-decoration:none;transition:.15s}
.nav-back:hover{background:var(--bg2)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.g-nav-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;border:1px solid var(--brd2);background:var(--sur);color:var(--txt2);font-size:12.5px;font-weight:600;cursor:pointer;text-decoration:none;transition:.15s}
.g-nav-btn:hover{background:var(--bg2)}
.gema-feedback-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:8px;border:none;background:#dc2626;color:#fff;font-size:12.5px;font-weight:700;cursor:pointer}.gema-feedback-btn:hover{background:#b91c1c}
.pg{max-width:1440px;margin:0 auto;padding:16px 24px 60px}
.ws-layout{display:flex;gap:16px;align-items:flex-start}
@media(max-width:768px){.ws-layout{flex-direction:column}}
.ws-sidebar{width:280px;flex-shrink:0}
@media(max-width:768px){.ws-sidebar{width:100%}}
.ws-sidebar h3{font-size:14px;font-weight:800;color:var(--txt);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.ws-content{flex:1;min-width:0}
.ws-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:1.5px solid var(--brd);background:var(--sur);cursor:pointer;transition:.15s;margin-bottom:6px}
.ws-row:hover{border-color:var(--plan-bd);background:var(--plan-bg)}
.ws-row.active{border-color:var(--plan);background:var(--plan-bg);box-shadow:0 0 0 2px rgba(124,58,237,.15)}
.ws-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ws-tile{display:flex;align-items:center;gap:10px;padding:14px;border-radius:12px;border:1.5px solid var(--brd);background:var(--sur);text-decoration:none;color:inherit;transition:.15s}
.ws-tile:hover{border-color:var(--plan-bd);transform:translateY(-1px);box-shadow:var(--sh)}
.ws-empty{padding:60px 24px;text-align:center;color:var(--mut)}
.ws-card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:16px;margin-top:12px}
.ws-card h4{font-size:12px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.btn-p{padding:7px 14px;border-radius:8px;border:none;background:var(--plan);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-p:hover{background:#6d28d9}
</style>
<script src="gema_db.js"></script>
<script src="gema_feedback.js"></script><script src="gema_notify.js"></script><script src="gema_notify_ui.js"></script>
<script src="gema_objekte_api.js"></script>
<link rel="stylesheet" href="gema_responsive.css"/>
</head>
<body style="background:#f4f6fb;color:#111827">
<nav class="g-nav"><div class="nav-in">
  <a class="nav-logo" href="index.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="80 196 180 175" height="28"><defs><clipPath id="c1"><path d="M 29 17 L 145 17 L 145 151 L 29 151 Z"/></clipPath><clipPath id="c2"><path d="M 58.37 0.61 L 173.86 67.29 L 116.11 167.31 L 0.62 100.64 Z"/></clipPath><clipPath id="c3"><path d="M 73 47.41 L 123.6 47.41 L 123.6 98 L 73 98 Z"/></clipPath></defs><g transform="translate(83,199)"><g clip-path="url(#c1)"><g clip-path="url(#c2)"><path fill="#000" d="M 144.93 50.64 L 144.93 117.29 L 87.21 150.62 L 29.48 117.29 L 29.48 50.64 L 87.21 17.31 Z"/></g></g><path fill="#fff" d="M 98.04 73.12 C 96.21 71.29 93.95 69.88 91.49 69.07 C 85.5 75.05 85.02 75.28 84.26 77.1 C 90.33 76.7 95.19 82.25 93.84 88.32 C 93.01 92.08 84.54 99.5 76.91 107.3 C 73.34 110.93 67.46 110.9 63.86 107.3 C 60.27 103.7 60.27 97.86 63.86 94.26 L 71.99 86.13 C 70.99 82.39 71.21 78.45 72.48 74.93 L 57.2 90.21 C 50.66 96.75 50.66 107.41 57.2 113.96 C 63.76 120.52 74.38 120.52 80.95 113.96 L 98.04 96.87 C 104.55 90.36 104.65 79.73 98.04 73.12 Z"/><g clip-path="url(#c3)"><path fill="#fff" d="M 118.84 76.08 C 122 72.91 123.75 68.69 123.75 64.21 C 123.75 54.94 116.24 47.41 106.95 47.41 C 102.47 47.41 98.25 49.16 95.09 52.32 C 90.81 56.6 82.27 65.14 78 69.42 C 71.51 75.9 71.37 86.54 78 93.17 C 79.83 95 82.09 96.4 84.55 97.21 C 90.5 91.27 91.02 91.02 91.78 89.19 C 89.15 89.36 86.57 88.41 84.67 86.51 C 81.04 82.88 81.11 77.03 84.67 73.46 C 87.86 70.28 95.88 62.25 99.13 59 C 102.73 55.4 108.58 55.39 112.18 59 C 115.78 62.6 115.78 68.45 112.18 72.05 L 104.05 80.18 C 105.07 84.02 104.82 87.89 103.56 91.37 Z"/></g></g></svg></a>
  <a class="nav-back" href="index.html">← Module</a>
  <span style="font-size:14px;font-weight:800;color:var(--txt)">🪣 Workspace</span>
  <div class="nav-right">
    <button class="gema-feedback-btn no-print" onclick="if(typeof GemaFeedback!=='undefined')GemaFeedback.start()">🔴 Feedback</button>
  </div>
</div></nav>

<div class="pg">
  <div class="ws-layout">
    <div class="ws-sidebar">
      <h3>Persönliche Eimer <button class="btn-p" onclick="_wsCreate()">+ Neu</button></h3>
      <div id="wsList"></div>
      <h3 style="margin-top:16px">Geteilte Eimer</h3>
      <div id="wsShared"></div>
    </div>
    <div class="ws-content" id="wsContent">
      <div class="ws-empty" id="wsEmpty">
        <div style="font-size:48px;margin-bottom:12px">🪣</div>
        <h2 style="font-size:20px;font-weight:800;margin-bottom:8px">Workspace</h2>
        <p style="font-size:13px;margin-bottom:20px">Erstelle einen Eimer um Module, Notizen und Beteiligte zu gruppieren.</p>
        <button class="btn-p" style="padding:10px 24px;font-size:14px" onclick="_wsCreate()">+ Ersten Eimer erstellen</button>
      </div>
      <div id="wsActive" style="display:none"></div>
    </div>
  </div>
</div>

<script>
(function(){
  var KEY='gema_workspace_v1';
  var buckets=[], activeId=null;

  var TYPES=[
    {id:'project',label:'Bauprojekt',icon:'🏗',color:'#1e3a5f',bg:'#eff6ff'},
    {id:'training',label:'Übung',icon:'🎓',color:'#7c3aed',bg:'#fdf4ff'},
    {id:'private',label:'Privat',icon:'🔒',color:'#6b7280',bg:'#f4f6fb'},
    {id:'shared',label:'Geteilt',icon:'👥',color:'#16a34a',bg:'#f0fdf4'}
  ];
  var MODULES=[
    {id:'sa_enthaertung',name:'Enthärtungsanlage',icon:'💧',href:'sa_enthaertung.html'},
    {id:'sa_osmose',name:'Umkehrosmose',icon:'🔬',href:'sa_osmose.html'},
    {id:'sb_druckerhoehung',name:'Druckerhöhung',icon:'⬆️',href:'sb_druckerhoehung.html'},
    {id:'sb_lu_tabelle',name:'LU-Tabelle',icon:'📊',href:'sb_lu_tabelle.html'},
    {id:'sb_warmwasser',name:'Warmwasser SIA 385',icon:'🌡️',href:'sb_warmwasser.html'},
    {id:'sb_niederschlag',name:'Niederschlag',icon:'🌧️',href:'sb_niederschlag.html'},
    {id:'sb_druckverlust',name:'Druckverlust',icon:'📉',href:'sb_druckverlust.html'},
    {id:'hy_w12',name:'W12 Selbstkontrolle',icon:'🧬',href:'hy_w12.html'},
    {id:'pm_objekte',name:'Objekte',icon:'🏢',href:'pm_objekte.html'},
    {id:'pm_terminplan',name:'Terminplan',icon:'📅',href:'pm_terminplan.html'},
    {id:'pm_ausschreibung',name:'Ausschreibung',icon:'📋',href:'pm_ausschreibung.html'},
    {id:'pm_abnahme',name:'Abnahmeprotokoll',icon:'📜',href:'pm_abnahme.html'},
    {id:'if_werkzeug',name:'Werkzeugmanagement',icon:'🔧',href:'if_werkzeug.html'},
    {id:'if_fahrzeug',name:'Fahrzeugmanagement',icon:'🚐',href:'if_fahrzeug.html'}
  ];

  function load(){try{var r=localStorage.getItem(KEY);if(r)buckets=JSON.parse(r);}catch(e){}}
  function save(){try{localStorage.setItem(KEY,JSON.stringify(buckets));}catch(e){}}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  window._wsCreate=function(){
    var name=prompt('Name des Eimers:');if(!name)return;
    var typStr=prompt('Typ:\n1. Bauprojekt\n2. Übung\n3. Privat\n4. Geteilt\n\nNummer:','1');
    var idx=Math.max(0,Math.min(3,(parseInt(typStr)||1)-1));
    buckets.push({id:'ws_'+Date.now(),name:name.trim(),type:TYPES[idx].id,shared:idx===3,modules:[],notes:[],activity:[{who:'Du',text:'Eimer erstellt',when:new Date().toISOString()}],createdAt:new Date().toISOString()});
    activeId=buckets[buckets.length-1].id;
    save();render();
  };
  window._wsOpen=function(id){activeId=id;render();};
  window._wsDel=function(id){
    if(!confirm('Eimer löschen?'))return;
    buckets=buckets.filter(function(b){return b.id!==id;});
    if(activeId===id)activeId=buckets.length?buckets[0].id:null;
    save();render();
  };
  window._wsAddMod=function(){
    var sel=document.getElementById('wsModSel');if(!sel||!sel.value)return;
    var b=buckets.find(function(x){return x.id===activeId;});if(!b)return;
    var mod=MODULES.find(function(x){return x.id===sel.value;});
    b.modules.push({mod:sel.value,status:'offen'});
    b.activity.push({who:'Du',text:mod.name+' hinzugefügt',when:new Date().toISOString()});
    save();render();
  };

  function render(){
    var personal=buckets.filter(function(b){return!b.shared;});
    var shared=buckets.filter(function(b){return b.shared;});
    document.getElementById('wsList').innerHTML=personal.map(rowHtml).join('')||'<div style="font-size:12px;color:var(--mut);padding:6px 0">Noch keine Eimer</div>';
    document.getElementById('wsShared').innerHTML=shared.map(rowHtml).join('')||'<div style="font-size:12px;color:var(--mut);padding:6px 0">Keine geteilten Eimer</div>';
    if(activeId){
      document.getElementById('wsEmpty').style.display='none';
      document.getElementById('wsActive').style.display='';
      renderContent();
    }else{
      document.getElementById('wsEmpty').style.display='';
      document.getElementById('wsActive').style.display='none';
    }
  }

  function rowHtml(b){
    var t=TYPES.find(function(x){return x.id===b.type;})||TYPES[0];
    return '<div class="ws-row'+(activeId===b.id?' active':'')+'" onclick="_wsOpen(\''+b.id+'\')">'
      +'<div class="ws-icon" style="background:'+t.bg+';color:'+t.color+'">'+t.icon+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(b.name)+'</div>'
      +'<div style="font-size:11px;color:var(--mut)">'+b.modules.length+' Module · '+t.label+'</div></div>'
      +'<button onclick="event.stopPropagation();_wsDel(\''+b.id+'\')" style="border:none;background:none;color:var(--mut);cursor:pointer;font-size:14px">✕</button></div>';
  }

  function renderContent(){
    var b=buckets.find(function(x){return x.id===activeId;});if(!b)return;
    var t=TYPES.find(function(x){return x.id===b.type;})||TYPES[0];
    var mods=b.modules.map(function(m){
      var mod=MODULES.find(function(x){return x.id===m.mod;});if(!mod)return '';
      return '<a href="'+mod.href+'" class="ws-tile"><span style="font-size:20px">'+mod.icon+'</span><div><div style="font-size:13px;font-weight:700">'+esc(mod.name)+'</div><div style="font-size:11px;color:var(--mut)">'+(m.status||'offen')+'</div></div></a>';
    }).join('');
    var avail=MODULES.filter(function(mod){return!b.modules.find(function(m){return m.mod===mod.id;});});
    var addHtml=avail.length?'<select id="wsModSel" onchange="_wsAddMod()" style="padding:10px 14px;border:1.5px dashed var(--plan-bd);border-radius:12px;background:var(--plan-bg);color:var(--plan);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit"><option value="">+ Modul hinzufügen</option>'+avail.map(function(m){return '<option value="'+m.id+'">'+m.icon+' '+esc(m.name)+'</option>';}).join('')+'</select>':'';

    document.getElementById('wsActive').innerHTML=
      '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">'
      +'<div class="ws-icon" style="width:44px;height:44px;font-size:22px;background:'+t.bg+';color:'+t.color+'">'+t.icon+'</div>'
      +'<div><h2 style="font-size:22px;font-weight:900;margin:0">'+esc(b.name)+'</h2>'
      +'<div style="font-size:12px;color:var(--mut)">'+t.label+' · '+b.modules.length+' Module · '+new Date(b.createdAt).toLocaleDateString('de-CH')+'</div></div></div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">'+mods+addHtml+'</div>'
      +'<div class="ws-card"><h4>Aktivität</h4>'
      +b.activity.slice().reverse().slice(0,8).map(function(a){
        return '<div style="display:flex;gap:8px;padding:6px 0;font-size:12px;border-bottom:1px solid #f1f5f9"><strong>'+esc(a.who)+'</strong><span style="color:var(--mut)">'+esc(a.text)+'</span><span style="margin-left:auto;color:var(--mut2);font-size:10px;white-space:nowrap">'+new Date(a.when).toLocaleDateString('de-CH')+'</span></div>';
      }).join('')+'</div>';
  }

  load();render();
})();
</script>
<script>document.addEventListener('DOMContentLoaded',function(){if(typeof GemaFeedback!=='undefined')GemaFeedback.init('workspace','Workspace');});</script>
<script src="gema_scroll.js"></script>
<script src="gema_mobile_menu.js"></script>
</body>
</html>
