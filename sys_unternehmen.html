<!doctype html>
<html lang="de">
<head>
<script src="gema_auth.js"></script>
<script src="gema_recent.js"></script>
<meta charset="utf-8"/>
<meta name="theme-color" content="#0f172a"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>GEMA – Unternehmen verwalten</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f6fb;--bg2:#edf0f7;--sur:#fff;--brd:#e2e7f0;--brd2:#cdd4e4;--txt:#111827;--txt2:#374151;--mut:#6b7280;--mut2:#9ca3af;--acc:#2563eb;--acc-bg:#eff4ff;--grn:#16a34a;--grn-bg:#f0fdf4;--red:#dc2626;--red-bg:#fef2f2;--amb:#d97706;--amb-bg:#fffbeb;--r:14px;--shadow-sm:0 1px 3px rgba(0,0,0,.08)}
body{font-family:"DM Sans",system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.g-nav{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--brd);box-shadow:var(--shadow-sm)}
.g-nav-inner{padding:0 24px;height:52px;display:flex;align-items:center}
.g-nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;margin-right:16px;flex-shrink:0}
.g-nav-mark{height:28px;display:flex;align-items:center}
.g-nav-bc{display:flex;align-items:center;gap:3px;flex:1;min-width:0}.g-nav-bc a,.g-nav-bc span{font-size:12.5px;color:var(--mut);text-decoration:none;padding:4px 7px;border-radius:6px}.g-nav-bc a:hover{background:var(--bg2);color:var(--txt)}.bc-sep{font-size:11px;color:var(--mut2)}.bc-cur{font-size:12px;font-weight:700;color:var(--txt)}.bc-cat{font-size:11px;font-weight:700;color:var(--mut);letter-spacing:.4px}
.g-nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}.g-nav-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;border:1px solid var(--brd2);background:var(--sur);color:var(--txt2);font-size:12.5px;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit}.g-nav-btn:hover{background:var(--bg2)}
.gema-feedback-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:8px;border:none;background:#dc2626;color:#fff;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}.gema-feedback-btn:hover{background:#b91c1c}
.g-page{max-width:1100px;margin:0 auto;padding:24px 20px 60px}
.tabs{display:flex;gap:2px;background:var(--bg2);padding:4px;border-radius:11px;margin-bottom:18px}
.tab{flex:1;padding:8px 12px;border-radius:8px;border:none;background:transparent;color:var(--mut);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center}.tab.active{background:var(--sur);color:var(--acc);box-shadow:var(--shadow-sm)}
.tab-body{display:none}.tab-body.active{display:block}
.card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:16px}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;gap:10px;background:#f8faff}
.card-hd h3{font-size:13.5px;font-weight:700}.card-bd{padding:18px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1.5px solid var(--brd2);background:var(--sur);color:var(--txt2);font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}.btn:hover{background:var(--bg2)}
.btn-p{background:var(--acc);border-color:var(--acc);color:#fff}.btn-p:hover{background:#1d4ed8}
.btn-d{border-color:#fecaca;color:var(--red);background:var(--red-bg)}.btn-d:hover{background:#fecaca}
.btn-sm{padding:5px 10px;font-size:11.5px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fg label{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
.fc{padding:8px 11px;border:1.5px solid var(--brd2);border-radius:8px;font-size:13px;font-family:inherit;width:100%}
.fc:focus{outline:none;border-color:var(--acc)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px}
.b-grn{background:var(--grn-bg);color:var(--grn);border:1px solid #bbf7d0}
.b-red{background:var(--red-bg);color:var(--red);border:1px solid #fecaca}
.b-amb{background:var(--amb-bg);color:var(--amb);border:1px solid #fde68a}
.b-blu{background:var(--acc-bg);color:var(--acc);border:1px solid #bfcfff}
input::placeholder{color:#cbd5e1!important}
@media print{.g-nav,.no-print{display:none!important}}
</style>
<script src="gema_db.js"></script>
<script src="gema_feedback.js"></script><script src="gema_notify.js"></script><script src="gema_notify_ui.js"></script>
<script src="gema_objekte_api.js"></script>
<link rel="stylesheet" href="gema_responsive.css"/>
</head>
<body>
<nav class="g-nav"><div class="g-nav-inner">
  <a class="g-nav-logo" href="index.html"><div class="g-nav-mark"><svg xmlns="http://www.w3.org/2000/svg" viewBox="80 196 415 175" height="28" preserveAspectRatio="xMidYMid meet"><defs><clipPath id="gn_c1"><path d="M 29 17 L 145 17 L 145 151 L 29 151 Z" clip-rule="nonzero"/></clipPath><clipPath id="gn_c2"><path d="M 58.367188 0.613281 L 173.855469 67.289062 L 116.105469 167.3125 L 0.621094 100.636719 Z" clip-rule="nonzero"/></clipPath><clipPath id="gn_c3"><path d="M 73 47.414062 L 123.597656 47.414062 L 123.597656 98 L 73 98 Z" clip-rule="nonzero"/></clipPath><clipPath id="gn_c4"><rect x="0" width="174" y="0" height="168"/></clipPath></defs><g transform="matrix(1,0,0,1,83,199)"><g clip-path="url(#gn_c4)"><g clip-path="url(#gn_c1)"><g clip-path="url(#gn_c2)"><path fill="#000" d="M 144.929688 50.640625 L 144.929688 117.292969 L 87.207031 150.617188 L 29.484375 117.292969 L 29.484375 50.640625 L 87.207031 17.3125 Z" fill-opacity="1" fill-rule="nonzero"/></g></g></g></g></svg></div></a>
  <div class="g-nav-bc">
    <span class="bc-cur" id="navTitle">Unternehmen verwalten</span>
  </div>
  <div class="g-nav-right">
    <button class="gema-feedback-btn no-print" onclick="if(typeof GemaFeedback!=='undefined')GemaFeedback.start()">🔴 Feedback</button>
  </div>
</div></nav>

<div class="g-page">
  <div class="tabs" id="mainTabs">
    <div class="tab active" data-tab="info">🏢 Firmendaten</div>
    <div class="tab" data-tab="benutzer">👥 Benutzer</div>
    <div class="tab" data-tab="abteilungen">🏗 Abteilungen</div>
    <div class="tab" data-tab="lizenzen">🔑 Lizenzen</div>
    <div class="tab" data-tab="gaeste">🤝 Gäste</div>
  </div>

  <!-- Tab: Firmendaten -->
  <div class="tab-body active" id="tb-info">
    <div class="card"><div class="card-hd"><h3>Firmendaten</h3></div><div class="card-bd">
      <div class="g2">
        <div class="fg"><label>Firmenname</label><input class="fc" id="orgName"/></div>
        <div class="fg"><label>Rechtsform</label><input class="fc" id="orgRechtsform" placeholder="z.B. GmbH, AG"/></div>
      </div>
      <div class="fg"><label>Adresse</label>
        <div style="position:relative">
          <input class="fc" id="orgAdrSearch" placeholder="Adresse eingeben — z.B. Bläsiring 153 Basel" oninput="_orgAdrSearch(this)" onkeydown="_orgAdrKey(event)" autocomplete="off"/>
          <span id="orgAdrTag" style="display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:var(--grn);background:var(--grn-bg);border:1px solid #bbf7d0;padding:2px 8px;border-radius:4px">✓ Verifiziert</span>
          <div id="orgAdrDrop" style="position:absolute;top:100%;left:0;right:0;z-index:400;background:var(--sur);border:1.5px solid var(--acc);border-top:none;border-radius:0 0 8px 8px;box-shadow:0 4px 16px rgba(0,0,0,.1);max-height:240px;overflow-y:auto;display:none"></div>
        </div>
        <div id="orgAdrDetail" style="display:none;gap:6px;flex-wrap:wrap;margin-top:6px"></div>
      </div>
      <input type="hidden" id="orgStrasse"/>
      <input type="hidden" id="orgPlz"/>
      <input type="hidden" id="orgOrt"/>
      <input type="hidden" id="orgKanton"/>
      <div class="fg"><label>Kategorie</label><select class="fc" id="orgKat"></select></div>
      <div class="g2">
        <div class="fg"><label>E-Mail</label><input class="fc" id="orgEmail" type="email"/></div>
        <div class="fg"><label>Telefon</label><input class="fc" id="orgTel"/></div>
      </div>
      <div class="fg"><label>Website</label><input class="fc" id="orgWeb" placeholder="https://"/></div>
      <div class="fg"><label>Sichtbarkeit</label>
        <select class="fc" id="orgSichtbarkeit">
          <option value="firma">Firma-weit (alle sehen alle Projekte)</option>
          <option value="abteilung">Abteilungs-getrennt (nur eigene Abteilung)</option>
        </select>
      </div>
      <button class="btn btn-p" onclick="saveOrgInfo()" style="margin-top:8px">💾 Speichern</button>
    </div></div>
  </div>

  <!-- Tab: Benutzer -->
  <div class="tab-body" id="tb-benutzer">
    <div class="card"><div class="card-hd"><h3>Benutzer</h3><button class="btn btn-p btn-sm" onclick="inviteUser()">+ Einladen</button></div>
    <div class="card-bd" id="userList" style="padding:0"></div></div>
  </div>

  <!-- Tab: Abteilungen -->
  <div class="tab-body" id="tb-abteilungen">
    <div class="card"><div class="card-hd"><h3>Abteilungen</h3><button class="btn btn-p btn-sm" onclick="addAbteilung()">+ Abteilung</button></div>
    <div class="card-bd" id="abtList" style="padding:0"></div></div>
  </div>

  <!-- Tab: Lizenzen -->
  <div class="tab-body" id="tb-lizenzen">
    <div class="card"><div class="card-hd"><h3>Lizenzübersicht</h3><button class="btn btn-p btn-sm" onclick="_openLizKauf()">+ Lizenzen kaufen</button></div>
    <div class="card-bd" id="lizInfo"></div></div>
    <div class="card"><div class="card-hd"><h3>Lizenzen pro Benutzer</h3></div>
    <div class="card-bd" id="lizUsers" style="padding:0"></div></div>
  </div>

  <!-- Tab: Gäste -->
  <div class="tab-body" id="tb-gaeste">
    <div class="card"><div class="card-hd"><h3>Gastbenutzer</h3><button class="btn btn-p btn-sm" onclick="addGast()">+ Gast hinzufügen</button></div>
    <div class="card-bd" id="gastList" style="padding:0"></div></div>
  </div>
</div>

<div id="toast" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:999;display:none"></div>

<script>
var _org=null,_user=null;

function init(){
  _user=GemaAuth.getCurrentUser();
  if(!_user){location.href='sys_login.html';return;}
  _org=GemaAuth.getCurrentOrg();
  if(!_org){document.querySelector('.g-page').innerHTML='<p style="padding:40px;text-align:center;color:var(--mut)">Kein Unternehmen zugeordnet.</p>';return;}
  // Prüfe ob Org-Admin oder GEMA-Admin
  if(!GemaAuth.isOrgAdmin(_user.id)){
    document.querySelector('.g-page').innerHTML='<p style="padding:40px;text-align:center;color:var(--mut)">⚠ Nur Unternehmens-Admins haben Zugriff auf diese Seite.</p><a href="index.html" style="display:block;text-align:center;margin-top:12px;color:var(--acc)">← Zurück</a>';
    return;
  }
  document.getElementById('navTitle').textContent=_org.name+' — Verwaltung';
  fillInfo();renderUsers();renderAbteilungen();renderLizenzen();renderGaeste();
  setupTabs();
}

function setupTabs(){
  document.querySelectorAll('.tab').forEach(function(t){
    t.addEventListener('click',function(){
      document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
      document.querySelectorAll('.tab-body').forEach(function(x){x.classList.remove('active');});
      t.classList.add('active');
      document.getElementById('tb-'+t.dataset.tab)?.classList.add('active');
    });
  });
}

function E(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.style.display='';clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none';},2500);}

// ── Firmendaten ──
function fillInfo(){
  document.getElementById('orgName').value=_org.name||'';
  document.getElementById('orgRechtsform').value=_org.rechtsform||'';
  var a=_org.adresse||{};
  document.getElementById('orgStrasse').value=a.strasse||'';
  document.getElementById('orgPlz').value=a.plz||'';
  document.getElementById('orgOrt').value=a.ort||'';
  document.getElementById('orgKanton').value=a.kanton||'';
  var adrSearch=document.getElementById('orgAdrSearch');
  if(adrSearch&&a.strasse){
    adrSearch.value=(a.strasse||'')+', '+(a.plz||'')+' '+(a.ort||'');
    var tag=document.getElementById('orgAdrTag');if(tag)tag.style.display='inline-flex';
    var detail=document.getElementById('orgAdrDetail');
    if(detail){detail.style.display='flex';detail.innerHTML='<span style="padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;background:var(--bg2);color:var(--txt2);border:1px solid var(--brd)">'+E(a.strasse)+'</span><span style="padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;background:var(--bg2);color:var(--txt2);border:1px solid var(--brd)">'+E(a.plz)+' '+E(a.ort)+'</span>'+(a.kanton?'<span style="padding:3px 10px;border-radius:6px;font-size:11px;font-weight:800;background:var(--acc-bg);color:var(--acc);border:1px solid #bfcfff">'+E(a.kanton)+'</span>':'');}
  }
  var k=_org.kontakt||{};
  document.getElementById('orgEmail').value=k.email||'';
  document.getElementById('orgTel').value=k.telefon||'';
  document.getElementById('orgWeb').value=k.website||'';
  document.getElementById('orgSichtbarkeit').value=(_org.settings||{}).sichtbarkeit||'firma';
  // Kategorien
  var cats=GemaAuth.getOrgCats?GemaAuth.getOrgCats():[];
  var sel=document.getElementById('orgKat');
  sel.innerHTML=cats.map(function(c){return '<option value="'+c.id+'"'+(c.id===_org.kategorie?' selected':'')+'>'+c.icon+' '+c.name+'</option>';}).join('');
}
function saveOrgInfo(){
  GemaAuth.updateOrgInfo(_org.id,{
    name:document.getElementById('orgName').value.trim(),
    rechtsform:document.getElementById('orgRechtsform').value.trim(),
    kategorie:document.getElementById('orgKat').value,
    adresse:{strasse:document.getElementById('orgStrasse').value.trim(),plz:document.getElementById('orgPlz').value.trim(),ort:document.getElementById('orgOrt').value.trim(),kanton:document.getElementById('orgKanton').value.trim(),land:'CH'},
    kontakt:{email:document.getElementById('orgEmail').value.trim(),telefon:document.getElementById('orgTel').value.trim(),website:document.getElementById('orgWeb').value.trim()}
  });
  GemaAuth.updateOrgSettings(_org.id,{sichtbarkeit:document.getElementById('orgSichtbarkeit').value});
  _org=GemaAuth.getCurrentOrg();
  toast('✓ Firmendaten gespeichert');
}

// ── Benutzer ──
function renderUsers(){
  var users=GemaAuth.getOrgUsers(_org.id);
  var el=document.getElementById('userList');
  if(!users.length){el.innerHTML='<p style="padding:16px;color:var(--mut)">Keine Benutzer.</p>';return;}
  var roles=GemaAuth.getRoles()||[];
  el.innerHTML=users.map(function(u){
    var rNames=(u.roleIds||[]).map(function(rid){var r=roles.find(function(x){return x.id===rid;});return r?r.name:'';}).filter(Boolean).join(', ');
    var isAdmin=_org.admins&&_org.admins.indexOf(u.id)>=0;
    var abt=(_org.abteilungen||[]).find(function(a){return a.id===u.abteilungId;});
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--brd)">'+
      '<div style="flex:1"><strong>'+E(u.name||u.username)+'</strong>'+(isAdmin?' <span class="badge b-blu">Admin</span>':'')+(u.kontotyp==='login_light'?' <span class="badge b-amb">Light</span>':'')+
      '<div style="font-size:11px;color:var(--mut)">'+E(rNames||'Keine Rolle')+(abt?' · '+E(abt.name):' · Keine Abteilung')+'</div></div>'+
      '<button class="btn btn-sm" onclick="_editUserRoles(\''+u.id+'\')" title="Rollen bearbeiten">🔑</button>'+
      '<select onchange="GemaAuth.setUserAbteilung(\''+u.id+'\',this.value);renderUsers()" style="padding:4px 8px;border:1px solid var(--brd2);border-radius:6px;font-size:11px">'+
        '<option value="">Keine Abt.</option>'+
        (_org.abteilungen||[]).map(function(a){return '<option value="'+a.id+'"'+(a.id===u.abteilungId?' selected':'')+'>'+E(a.name)+'</option>';}).join('')+
      '</select>'+
      (u.id!==_user.id?'<button class="btn btn-d btn-sm" onclick="deaktivierUser(\''+u.id+'\')">Deaktivieren</button>':'')+
    '</div>';
  }).join('');
}

function _editUserRoles(userId){
  var users=GemaAuth.getUsers()||[];
  var u=users.find(function(x){return x.id===userId;});
  if(!u)return;
  var allRoles=GemaAuth.getRoles()||[];
  var assignable=allRoles.filter(function(r){return r.id!=='role_admin';});
  var currentIds=u.roleIds||[];
  var html='<div style="background:#fff;border-radius:14px;padding:24px;max-width:420px;width:100%;box-shadow:0 20px 60px -10px rgba(0,0,0,.3)">'
    +'<h3 style="margin:0 0 4px;font-size:17px;font-weight:900">🔑 Rollen bearbeiten</h3>'
    +'<div style="font-size:12px;color:#64748b;margin-bottom:16px">'+E(u.name||u.username)+'</div>'
    +'<div id="_roleCheckboxes" style="display:flex;flex-direction:column;gap:6px">'
    +assignable.map(function(r){
      var checked=currentIds.indexOf(r.id)>=0;
      return '<label style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;cursor:pointer;border:1.5px solid '+(checked?r.color+'40':'#e2e7f0')+';background:'+(checked?r.color+'08':'#fff')+'"><input type="checkbox" value="'+r.id+'"'+(checked?' checked':'')+' style="accent-color:'+r.color+'"/> <span style="font-size:13px;font-weight:600;color:'+(checked?r.color:'#374151')+'">'+E(r.name)+'</span></label>';
    }).join('')
    +'</div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">'
    +'  <button onclick="_closeRoleModal()" style="padding:8px 16px;border-radius:8px;border:1.5px solid #c8cfdf;background:#fff;color:#334155;cursor:pointer;font-weight:600;font-family:inherit">Abbrechen</button>'
    +'  <button onclick="_saveUserRoles(\''+userId+'\')" style="padding:8px 16px;border-radius:8px;border:none;background:var(--acc);color:#fff;cursor:pointer;font-weight:700;font-family:inherit">✓ Speichern</button>'
    +'</div></div>';
  var ov=document.createElement('div');
  ov.id='_roleModalOv';
  ov.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:10500;display:flex;align-items:center;justify-content:center;padding:20px';
  ov.innerHTML=html;
  document.body.appendChild(ov);
  document.body.classList.add('modal-open');
}
function _saveUserRoles(userId){
  var cbs=document.querySelectorAll('#_roleCheckboxes input[type="checkbox"]');
  var newRoles=[];
  cbs.forEach(function(cb){if(cb.checked)newRoles.push(cb.value);});
  var users=GemaAuth.getUsers()||[];
  var u=users.find(function(x){return x.id===userId;});
  if(u){u.roleIds=newRoles;GemaAuth.saveUsers(users);}
  _closeRoleModal();
  renderUsers();
  toast('Rollen aktualisiert');
}
function _closeRoleModal(){
  var ov=document.getElementById('_roleModalOv');
  if(ov)ov.remove();
  document.body.classList.remove('modal-open');
}
function inviteUser(){
  var email=prompt('E-Mail des neuen Benutzers:');if(!email)return;
  var name=prompt('Name:','');
  var result=GemaAuth.inviteLieferant({email:email,firma:_org.name,person:name||'',orgId:_org.id,eingeladenVon:_user.name});
  // Setze orgId auf das aktuelle Unternehmen
  var users=GemaAuth.getUsers()||[];
  var u=users.find(function(x){return x.id===result.user.id;});
  if(u){u.orgId=_org.id;u.roleIds=['role_planer'];GemaAuth.saveUsers(users);}
  toast('✉ Einladung gesendet: '+result.loginUrl);
  renderUsers();renderLizenzen();
}
function deaktivierUser(userId){
  if(!confirm('Benutzer deaktivieren?'))return;
  var users=GemaAuth.getUsers()||[];
  var u=users.find(function(x){return x.id===userId;});
  if(u){u.active=false;GemaAuth.saveUsers(users);}
  renderUsers();toast('Benutzer deaktiviert');
}

// ── Abteilungen ──
function renderAbteilungen(){
  var abts=_org.abteilungen||[];
  var el=document.getElementById('abtList');
  if(!abts.length){el.innerHTML='<p style="padding:16px;color:var(--mut)">Keine Abteilungen. Aktivieren Sie Abteilungen unter Firmendaten → Sichtbarkeit.</p>';return;}
  el.innerHTML=abts.map(function(a){
    var users=GemaAuth.getOrgUsers(_org.id).filter(function(u){return u.abteilungId===a.id;});
    return '<div style="display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--brd)">'+
      '<div style="width:12px;height:12px;border-radius:50%;background:'+(a.farbe||'#6b7280')+';flex-shrink:0"></div>'+

      var has=uLiz.indexOf(gw.id)>=0;
      return '<span onclick="_toggleUserLiz(\''+u.id+'\',\''+gw.id+'\')" style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid '+(has?'var(--acc)':'var(--brd2)')+';background:'+(has?'var(--acc-bg)':'#fff')+';color:'+(has?'var(--acc)':'var(--mut)')+'">'+gw.icon+' '+gw.name+'</span>';

function _toggleUserLiz(userId,paketId){
  var users=GemaAuth.getUsers()||[];
  var u=users.find(function(x){return x.id===userId;});
  if(!u)return;
  if(!u.lizenzen)u.lizenzen=[];
  var idx=u.lizenzen.indexOf(paketId);
  if(idx>=0)u.lizenzen.splice(idx,1);
  else u.lizenzen.push(paketId);
  GemaAuth.saveUsers(users);
  renderLizenzen();
}

function _lizCalcTotal(){
  var total=0;
  document.querySelectorAll('#_lizPakete input[type="number"]').forEach(function(inp){
    total+=(+inp.value||0)*(+inp.dataset.preis||0);
  });
  document.getElementById('_lizTotal').textContent='CHF '+total.toFixed(2);
}
function _lizKaufen(){
  var methode=document.querySelector('[name="lizZahlung"]:checked').value;
  if(!_org.lizenzen)_org.lizenzen={pakete:[]};
  if(!_org.lizenzen.pakete)_org.lizenzen.pakete=[];
  var added=0;
  document.querySelectorAll('#_lizPakete input[type="number"]').forEach(function(inp){
    var n=+inp.value||0;
    for(var i=0;i<n;i++){
      _org.lizenzen.pakete.push({paketId:inp.dataset.paket,kaufDatum:new Date().toISOString().split('T')[0],methode:methode,status:'aktiv'});
      added++;
    }
  });
  if(!added){alert('Bitte mindestens eine Lizenz auswählen.');return;}
  GemaAuth.updateOrg(_org.id,{lizenzen:_org.lizenzen});
  _closeLizModal();
  renderLizenzen();
  toast(added+' Lizenz(en) hinzugefügt — '+methode);
}
function _closeLizModal(){
  var ov=document.getElementById('_lizModalOv');
  if(ov)ov.remove();
  document.body.classList.remove('modal-open');
}

// ── Adress-Autocomplete (swisstopo API) ──
var _orgAdrTimer=null,_orgAdrCache={},_orgAdrIdx=-1;
function _orgAdrSearch(input){
  var q=input.value.trim();
  var drop=document.getElementById('orgAdrDrop');
  var tag=document.getElementById('orgAdrTag');if(tag)tag.style.display='none';
  var detail=document.getElementById('orgAdrDetail');if(detail){detail.style.display='none';detail.innerHTML='';}
  document.getElementById('orgStrasse').value='';
  document.getElementById('orgPlz').value='';
  document.getElementById('orgOrt').value='';
  document.getElementById('orgKanton').value='';
  if(q.length<2){drop.style.display='none';return;}
  clearTimeout(_orgAdrTimer);
  _orgAdrTimer=setTimeout(function(){_orgAdrFetch(q);},250);
}
function _orgAdrFetch(q){
  var drop=document.getElementById('orgAdrDrop');
  if(_orgAdrCache[q]){_orgAdrRender(_orgAdrCache[q]);return;}
  drop.innerHTML='<div style="padding:12px;text-align:center;font-size:12px;color:var(--mut)">Suche…</div>';
  drop.style.display='block';_orgAdrIdx=-1;
  fetch('https://api3.geo.admin.ch/rest/services/api/SearchServer?searchText='+encodeURIComponent(q)+'&type=locations&origins=address&limit=8&lang=de')
    .then(function(r){return r.json();})
    .then(function(data){
      var results=(data.results||[]).map(function(r){
        var a=r.attrs||{};
        var label=(a.label||'').replace(/<\/?b>/g,'');
        var strasse='',plz='',ort='',kanton='';
        var parts=label.split(',').map(function(s){return s.trim();});
        if(parts.length>=2){
          strasse=parts[0];
          var m=parts[parts.length-1].match(/^(\d{4})\s+(.+)/);
          if(m){plz=m[1];ort=m[2];}else ort=parts[parts.length-1];
        }else{
          var m2=label.match(/^(.+?\s+\d+\w?)\s+(\d{4})\s+(.+)$/);
          if(m2){strasse=m2[1];plz=m2[2];ort=m2[3];}else strasse=label;
        }
        if(a.plz)plz=String(a.plz);
        if(a.kanton)kanton=a.kanton;
        return{strasse:strasse,plz:plz,ort:ort,kanton:kanton};
      });
      _orgAdrCache[q]=results;
      _orgAdrRender(results);
    })
    .catch(function(){drop.innerHTML='<div style="padding:12px;text-align:center;font-size:12px;color:var(--red)">API nicht erreichbar</div>';});
}
function _orgAdrRender(results){
  var drop=document.getElementById('orgAdrDrop');
  if(!results.length){drop.innerHTML='<div style="padding:12px;text-align:center;font-size:12px;color:var(--mut)">Keine Adresse gefunden</div>';drop.style.display='block';return;}
  drop.innerHTML=results.map(function(r,i){
    return '<div class="_orgAdrItem" data-idx="'+i+'" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--brd);transition:.1s"><div style="font-weight:700;font-size:13px;color:var(--txt)">'+E(r.strasse)+'</div><div style="font-size:11px;color:var(--mut)">'+E(r.plz)+' '+E(r.ort)+(r.kanton?' · '+E(r.kanton):'')+'</div></div>';
  }).join('');
  drop.style.display='block';
  drop._results=results;
  drop.querySelectorAll('._orgAdrItem').forEach(function(el){
    el.addEventListener('mousedown',function(e){e.preventDefault();_orgAdrSelect(+el.dataset.idx);});
    el.addEventListener('mouseenter',function(){_orgAdrIdx=+el.dataset.idx;_orgAdrHL();});
  });
}
function _orgAdrSelect(idx){
  var drop=document.getElementById('orgAdrDrop');
  var results=drop._results;if(!results||!results[idx])return;
  var r=results[idx];
  document.getElementById('orgStrasse').value=r.strasse;
  document.getElementById('orgPlz').value=r.plz;
  document.getElementById('orgOrt').value=r.ort;
  document.getElementById('orgKanton').value=r.kanton||'';
  document.getElementById('orgAdrSearch').value=r.strasse+', '+r.plz+' '+r.ort;
  var tag=document.getElementById('orgAdrTag');if(tag)tag.style.display='inline-flex';
  var detail=document.getElementById('orgAdrDetail');
  if(detail){detail.style.display='flex';detail.innerHTML='<span style="padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;background:var(--bg2);color:var(--txt2);border:1px solid var(--brd)">'+E(r.strasse)+'</span><span style="padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;background:var(--bg2);color:var(--txt2);border:1px solid var(--brd)">'+E(r.plz)+' '+E(r.ort)+'</span>'+(r.kanton?'<span style="padding:3px 10px;border-radius:6px;font-size:11px;font-weight:800;background:var(--acc-bg);color:var(--acc);border:1px solid #bfcfff">'+E(r.kanton)+'</span>':'');}
  drop.style.display='none';_orgAdrIdx=-1;
}
function _orgAdrKey(ev){
  var drop=document.getElementById('orgAdrDrop');
  var results=drop._results||[];
  if(drop.style.display==='none'||!results.length)return;
  if(ev.key==='ArrowDown'){ev.preventDefault();_orgAdrIdx=Math.min(_orgAdrIdx+1,results.length-1);_orgAdrHL();}
  else if(ev.key==='ArrowUp'){ev.preventDefault();_orgAdrIdx=Math.max(_orgAdrIdx-1,0);_orgAdrHL();}
  else if(ev.key==='Enter'){ev.preventDefault();if(_orgAdrIdx>=0)_orgAdrSelect(_orgAdrIdx);}
  else if(ev.key==='Escape'){drop.style.display='none';}
}
function _orgAdrHL(){
  var drop=document.getElementById('orgAdrDrop');
  drop.querySelectorAll('._orgAdrItem').forEach(function(el,i){el.style.background=i===_orgAdrIdx?'var(--acc-bg)':'';});
}
